<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>글로벌 마블 | 세계 도시 보드게임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --felt:#0E3B32; --felt2:#092820; --paper:#F8F2E0; --paper2:#EFE5C8;
  --ink:#2B2417; --line:#C9BC9C; --red:#D8432F; --blue:#1E5FAE;
  --gold:#C9A227; --wood:#3E3423;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  min-height:100vh;
  background:radial-gradient(1100px 700px at 50% 18%, #155246, var(--felt) 55%, var(--felt2));
  font-family:'Noto Sans KR',sans-serif;color:var(--ink);
}
button{font-family:inherit;cursor:pointer;touch-action:manipulation}
.hidden{display:none!important}
b{font-weight:700}
.pos{color:#1E7A45}
.neg{color:#C0392B}

/* ---------- 버튼 ---------- */
.btn{
  border:none;border-radius:10px;padding:10px 16px;font-size:15px;font-weight:700;
  background:#E7DDBE;color:var(--ink);box-shadow:0 2px 0 rgba(0,0,0,.25);
  transition:transform .06s ease, filter .12s;
}
.btn:hover{filter:brightness(1.05)}
.btn:active{transform:translateY(2px);box-shadow:none}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn.primary{background:var(--red);color:#fff}
.btn.alt{background:var(--blue);color:#fff}
.btn.ghost{background:transparent;border:2px solid rgba(0,0,0,.25);box-shadow:none}
.btn.danger{background:#8C2F2F;color:#fff}
.btn.mini{padding:5px 10px;font-size:12.5px;border-radius:8px}
.btn.big{font-size:18px;padding:14px 20px;width:100%}
.icon-btn{background:rgba(255,255,255,.12);border:none;border-radius:8px;color:#F3EDD8;font-size:16px;padding:6px 9px}
.icon-btn:hover{background:rgba(255,255,255,.22)}

/* ---------- 시작 화면 ---------- */
#setup{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-card{
  width:min(480px,94vw);background:var(--paper);border-radius:18px;padding:26px 26px 22px;
  box-shadow:0 24px 60px rgba(0,0,0,.5), inset 0 0 0 3px var(--gold), inset 0 0 0 6px var(--paper);
}
.logo{
  font-family:'Do Hyeon',sans-serif;font-size:46px;text-align:center;letter-spacing:.04em;
  color:#173A5E;line-height:1.05;
}
.logo .dice-glyph{color:var(--red)}
.tagline{text-align:center;color:#6E6248;font-size:13.5px;margin:6px 0 4px}
.stripe{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:12px 0 4px}
.stripe span{flex:1}
.sec-label{font-size:12.5px;font-weight:900;color:#8A7A54;letter-spacing:.12em;margin:16px 0 7px}
.mode-row{display:flex;gap:10px}
.mode-btn{
  flex:1;padding:13px 6px;border-radius:12px;border:2px solid var(--line);background:#fff;
  font-size:16px;font-weight:900;color:#5A5240;
}
.mode-btn.sel{border-color:var(--red);background:#FDEDE8;color:var(--red)}
.nrow{display:flex;align-items:center;gap:9px;margin-top:8px}
.nrow input{
  flex:1;padding:9px 12px;border-radius:10px;border:2px solid var(--line);background:#fff;
  font-size:15px;font-family:inherit;
}
.nrow input:focus{outline:none;border-color:var(--blue)}
.cash-row{display:flex;gap:8px}
.cashopt{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 4px;
  border:2px solid var(--line);border-radius:10px;background:#fff;font-size:14px;font-weight:700;
}
.cashopt:has(input:checked){border-color:var(--red);background:#FDEDE8;color:var(--red)}
.opt-row{display:flex;align-items:flex-start;gap:8px;margin-top:16px;font-size:13.5px;line-height:1.45;color:#4C4433}
.opt-row input{margin-top:3px;transform:scale(1.15)}
#startBtn{margin-top:18px}
#rulesBtn0{width:100%;margin-top:9px}

/* ---------- 게임 레이아웃 ---------- */
.game-wrap{display:flex;gap:14px;align-items:flex-start;justify-content:center;padding:12px;flex-wrap:wrap}
#board{
  width:min(96vw, calc(100vh - 24px), 860px);
  aspect-ratio:1/1;
  display:grid;
  grid-template-columns:1.55fr repeat(10,1fr) 1.55fr;
  grid-template-rows:1.55fr repeat(10,1fr) 1.55fr;
  gap:2.5px;background:var(--wood);padding:7px;border-radius:16px;
  box-shadow:0 22px 50px rgba(0,0,0,.5), inset 0 0 0 2px #5A4C32;
  container-type:size;
}

/* ---------- 칸 ---------- */
.cell{position:relative;background:var(--paper);border-radius:4px;overflow:hidden;cursor:pointer}
.cell:hover{filter:brightness(1.04)}
.cell .band{position:absolute;background:var(--gc,#999)}
.side-b .band{top:0;left:0;right:0;height:17%}
.side-t .band{bottom:0;left:0;right:0;height:17%}
.side-l .band{right:0;top:0;bottom:0;width:15%}
.side-r .band{left:0;top:0;bottom:0;width:15%}
.inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:2px;text-align:center}
.side-b .inner{padding-top:18%}
.side-t .inner{padding-bottom:18%}
.side-l .inner{padding-right:16%}
.side-r .inner{padding-left:16%}
.nm{font-weight:900;font-size:9px;font-size:1.52cqw;line-height:1.12;word-break:keep-all}
.nm.sm{font-size:8px;font-size:1.32cqw;color:#7A6C48}
.pr{font-size:8px;font-size:1.32cqw;color:#6E6248;font-weight:700}
.blds{font-size:8px;font-size:1.36cqw;line-height:1;min-height:1.4cqw;letter-spacing:-.05em}
.key-ic{font-size:13px;font-size:2.3cqw}
.mini-ic{font-size:13px;font-size:2.3cqw;line-height:1}
.mini-sub{font-size:8px;font-size:1.22cqw;color:#7A6C48;font-weight:700}
.corner .cor-ic{font-size:18px;font-size:3.2cqw}
.corner .nm{font-size:10px;font-size:1.68cqw}
.corner .cor-sub{font-size:8px;font-size:1.3cqw;color:#7A6C48;font-weight:700}
.cell.t-care{background:#E7F3EB}
.cell.t-daycare{background:#FCF2DA}
.cell.t-teleport{background:#ECE5F7}
.cell.t-cheongyeon{background:#FAEFCB}
.cell.t-care .inner,.cell.t-daycare .inner,.cell.t-teleport .inner,.cell.t-cheongyeon .inner{padding:2px}
.cell.owned{box-shadow:inset 0 0 0 3px var(--oc)}
.tokens{position:absolute;bottom:1px;left:0;right:0;display:flex;gap:1px;justify-content:center;align-items:flex-end;flex-wrap:wrap;pointer-events:none;z-index:3}

/* ---------- 중앙 콘솔 ---------- */
#console{
  grid-area:2/2/12/12;margin:4px;border-radius:12px;
  background:linear-gradient(165deg,#11493C,#0A332A 70%);
  box-shadow:inset 0 0 0 2px rgba(243,231,184,.18);
  display:flex;flex-direction:column;align-items:stretch;padding:10px 14px;gap:6px;
  color:#F0EAD4;overflow:hidden;
}
.c-title{font-family:'Do Hyeon',sans-serif;font-size:24px;font-size:4.4cqw;text-align:center;color:#F3E7B8;letter-spacing:.06em;line-height:1}
.c-eng{text-align:center;font-size:9px;font-size:1.5cqw;letter-spacing:.42em;color:rgba(243,231,184,.55);font-weight:700;margin-top:-2px}
#turnBanner{
  text-align:center;font-size:14px;font-size:2.3cqw;background:rgba(0,0,0,.28);
  border-radius:99px;padding:5px 10px;margin:2px auto 0;max-width:92%;
}
#turnBanner .tno{opacity:.6;font-size:.82em;margin-left:6px}
.dice-row{display:flex;gap:14px;justify-content:center;margin:4px 0 2px}
.die{
  width:52px;height:52px;width:8.4cqw;height:8.4cqw;min-width:42px;min-height:42px;max-width:64px;max-height:64px;
  background:#FDFBF3;border-radius:18%;box-shadow:0 4px 8px rgba(0,0,0,.4), inset 0 -3px 0 rgba(0,0,0,.12);
  display:grid;grid-template:repeat(3,1fr)/repeat(3,1fr);padding:14%;
}
.die span{display:flex;align-items:center;justify-content:center}
.die .pip{background:#2B2417;border-radius:50%;width:72%;aspect-ratio:1;margin:auto}
.die.ace .pip{background:var(--red);transform:scale(1.35)}
@keyframes shake{0%{transform:rotate(0)}25%{transform:rotate(-14deg) translateY(-3px)}50%{transform:rotate(10deg)}75%{transform:rotate(-8deg) translateY(-2px)}100%{transform:rotate(0)}}
.die.shake{animation:shake .16s linear infinite}
#actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;min-height:46px;align-items:center}
#actions .btn{font-size:14px;font-size:2.15cqw;padding:8px 14px}
#log{
  flex:1;overflow-y:auto;background:rgba(0,0,0,.28);border-radius:10px;padding:7px 11px;
  font-size:12px;font-size:1.85cqw;line-height:1.55;min-height:0;
}
#log .ln{padding:1px 0;border-bottom:1px dashed rgba(255,255,255,.07)}
#log .ln.big{color:#FFD98A;font-weight:700}
#log .turnline{color:rgba(240,234,212,.55)}
#log .dblmark{color:#FFD98A}
#log .pos{color:#8FE3AE}
#log .neg{color:#FF9E8C}

/* ---------- 사이드 패널 ---------- */
#side{width:320px;max-width:96vw;display:flex;flex-direction:column;gap:10px}
.side-head{display:flex;align-items:center;justify-content:space-between}
.side-title{font-family:'Do Hyeon',sans-serif;font-size:22px;color:#F3E7B8;letter-spacing:.05em}
.tools{display:flex;gap:6px}
#players{display:flex;flex-direction:column;gap:8px}
.pcard{
  background:var(--paper);border-radius:12px;padding:9px 12px;
  box-shadow:0 4px 12px rgba(0,0,0,.3);border-left:6px solid transparent;
}
.pcard.now{border-left-color:var(--red);box-shadow:0 4px 12px rgba(0,0,0,.3), 0 0 0 2px rgba(255,255,255,.55)}
.pcard.dead{opacity:.5;filter:grayscale(.8)}
.prow1{display:flex;align-items:center;gap:7px}
.pname{font-size:15px}
.st{font-size:11px;font-weight:900;padding:2px 7px;border-radius:99px;margin-left:auto}
.st.isl{background:#FBE3C0;color:#8A5A16}
.st.trv{background:#D7E6FB;color:#1E5FAE}
.st.cy{background:#F3E7B8;color:#8A6A10}
.st.dead{background:#E8D9D9;color:#8C2F2F}
.prow2{display:flex;justify-content:space-between;align-items:baseline;font-size:13.5px;margin-top:3px}
.prow2 .tot{font-size:11.5px;color:#7A6C48}
.prow3{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px;min-height:12px}
.chip{width:13px;height:13px;border-radius:3.5px;display:inline-block;box-shadow:inset 0 0 0 1px rgba(0,0,0,.2)}
.nochip{font-size:11px;color:#A79A78}
.prow4{margin-top:5px;display:flex;gap:5px;flex-wrap:wrap}
.itm{font-size:11px;background:#FFF7DE;border:1px solid #E3D6A4;border-radius:6px;padding:1px 6px;font-weight:700}
.pdot{
  display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;
  color:#fff;font-weight:900;font-size:11px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.35);flex:none;
}
.pdot.sm{width:16px;height:16px;font-size:9px}
.pdot{font-size:12px;line-height:1}
.pdot.sm{font-size:10px}
.fund-box{
  background:rgba(0,0,0,.3);color:#F3E7B8;border-radius:12px;padding:9px 14px;font-size:14px;
  display:flex;justify-content:space-between;align-items:center;border:1px dashed rgba(243,231,184,.35);
}

/* ---------- 모달 ---------- */
#mBack{
  position:fixed;inset:0;background:rgba(6,20,16,.62);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;
}
#mBox{
  width:min(440px,94vw);max-height:88vh;background:var(--paper);border-radius:16px;overflow:hidden;
  box-shadow:0 30px 70px rgba(0,0,0,.55);display:flex;flex-direction:column;
}
#mTitle{
  font-family:'Do Hyeon',sans-serif;font-size:21px;padding:12px 18px;color:#fff;
  background:#173A5E;letter-spacing:.03em;flex:none;
}
#mBody{padding:14px 18px 4px;font-size:14.5px;line-height:1.6;overflow-y:auto}
#mBody p{margin:6px 0}
#mBtns{display:flex;gap:8px;justify-content:flex-end;padding:12px 18px 16px;flex-wrap:wrap;flex:none}
.hint{font-size:12.5px;color:#7A6C48}
.big-amt{font-size:18px;text-align:center;margin:10px 0}
.scoreline{text-align:center;font-size:16px;margin:8px 0;letter-spacing:.02em}
.winline{font-size:17px;display:flex;align-items:center;gap:8px}

/* 증서 */
.deed{border:2px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:6px;background:#fff}
.deedhead{color:#fff;font-weight:900;font-size:16px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.deedg{font-size:11px;font-weight:700;opacity:.92}
.deedtbl{width:100%;border-collapse:collapse;font-size:13px}
.deedtbl td{padding:4.5px 12px;border-top:1px solid #EFE8D2}
.deedtbl td:nth-child(2n){text-align:right;font-weight:700}
.deedtbl .fullr td{background:#FBF4DC;font-weight:900}

/* 황금열쇠 카드 */
.keycard{
  border:2px solid var(--gold);border-radius:12px;background:linear-gradient(170deg,#FFFBEA,#F6EBC8);
  padding:14px 16px;text-align:center;box-shadow:inset 0 0 0 4px #fff;
}
.keytitle{font-family:'Do Hyeon',sans-serif;font-size:22px;color:#8A6A10;margin-bottom:4px}

/* 건설 목록 */
.blist{display:flex;flex-direction:column;gap:6px}
.brow{display:flex;align-items:center;gap:9px;background:#fff;border:2px solid var(--line);border-radius:10px;padding:8px 12px;font-size:14.5px}
.brow:has(input:checked){border-color:var(--blue);background:#EFF5FD}
.brow .bcost{margin-left:auto;font-weight:700}
.brow input{transform:scale(1.25)}
.btotal{text-align:right;font-size:14px}

/* 목적지, 매각 선택 */
.pickgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;max-height:44vh;overflow-y:auto;padding:2px}
.pickgrid.one{grid-template-columns:1fr}
.pick{
  display:flex;align-items:center;gap:7px;border:1.5px solid var(--line);border-radius:8px;
  background:#fff;padding:6px 8px;font-size:12.5px;text-align:left;
}
.pick:hover{border-color:var(--blue);background:#EFF5FD}
.pickband{width:8px;height:20px;border-radius:3px;flex:none}
.pickn{font-weight:700;word-break:keep-all}
.picks{margin-left:auto;color:#7A6C48;font-size:11px;text-align:right;flex:none}
.sellrow{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--line);border-radius:9px;padding:7px 10px;font-size:13.5px;margin-bottom:5px}
.sellrow .srn{font-weight:700}
.sellrow .btn{margin-left:auto}
.selllist{max-height:38vh;overflow-y:auto}

/* 규칙 */
.rules h4{margin:12px 0 4px;font-size:14.5px;color:#173A5E}
.rules p{margin:3px 0;font-size:13.5px}

/* ================================================================
   숨은 관리자 입력칸과 관리자 패널
   ================================================================ */
.secret-row{margin-top:7px;display:flex;justify-content:center}
#secretIn{
  width:78px;height:20px;text-align:center;letter-spacing:.28em;font:inherit;font-size:11px;
  border:1px dashed rgba(243,231,184,.16);background:rgba(0,0,0,.2);color:rgba(243,231,184,.5);
  border-radius:6px;opacity:.14;transition:opacity .25s;outline:none;
}
#secretIn:hover,#secretIn:focus{opacity:.75}
body.admin-on .secret-row{display:none}
.rigtag{margin-left:8px;background:#3B3B44;color:#FFD98A;border-radius:6px;padding:1px 6px;font-size:11px;font-weight:800}
.admtag{background:#3B3B44;color:#FFD98A;border-radius:5px;padding:0 5px;font-size:11px}

.adm{font-size:13px;max-height:56vh;overflow:auto;padding-right:4px}
.adm-sec{margin:9px 0 0;padding-top:8px;border-top:1px dashed var(--line)}
.adm-sec h5{margin:0 0 5px;font-size:11.5px;letter-spacing:.05em;color:#7A6E52;font-weight:800}
.adm-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:5px 0}
.adm input,.adm select{border:1px solid var(--line);border-radius:8px;padding:5px 7px;font:inherit;font-size:12.5px;background:#fff;color:var(--ink)}
.adm input[type=number]{width:92px}
.adm select{max-width:160px}
.adm .btn.sm{padding:5px 9px;font-size:12px;border-radius:8px;box-shadow:0 2px 0 rgba(0,0,0,.2)}
.adm .btn.sm:active{transform:translateY(2px);box-shadow:none}
.adm .pbtn{border:2px solid var(--line);border-radius:10px;background:#fff;padding:4px 9px;
  font-weight:800;font-size:12.5px;cursor:pointer;display:flex;align-items:center;gap:5px;color:var(--ink)}
.adm .pbtn.on{border-color:var(--red);background:#FDEDE8}
.adm .pbtn.dead{opacity:.42;text-decoration:line-through}
.adm .lbl{font-size:12px;color:#7A6E52;font-weight:700}
.adm .hintline{font-size:11.5px;color:#8A7F66;margin:2px 0 0;width:100%}

/* ================================================================
   3D 피규어 말 (순수 CSS 3D, 크기는 font-size 로 조절)
   ================================================================ */
.fstage{position:relative;width:100%;height:100%;perspective:360px;perspective-origin:50% 44%}
.fscene{position:absolute;inset:0;transform-style:preserve-3d;transform:rotateX(-15deg)}
.fgrp{position:absolute;left:50%;top:76%;transform-style:preserve-3d;animation:figspin 7s linear infinite}
@keyframes figspin{from{transform:rotateY(0deg)}to{transform:rotateY(360deg)}}
.fstage.still .fgrp{animation:none;transform:rotateY(-26deg)}
.fface,.ftri{position:absolute;left:50%;top:50%}
.ftri{transform-origin:50% 0;clip-path:polygon(50% 0%,100% 100%,0% 100%)}
.fdisc{border-radius:50%}
.fdf{display:grid;grid-template:repeat(3,1fr)/repeat(3,1fr);padding:9%}
.fdf span{display:flex;align-items:center;justify-content:center}
.fdf .pip{width:76%;aspect-ratio:1;margin:auto;border-radius:50%;background:rgba(255,255,255,.94)}
.fpad{position:absolute;left:50%;top:76%;width:1.5em;height:.5em;margin:-.25em 0 0 -.75em;border-radius:50%;
  background:radial-gradient(closest-side, rgba(0,0,0,.45), transparent 78%)}

/* 피규어 선택 버튼과 선택 그리드 */
.figbtn{flex:none;width:54px;height:58px;border-radius:12px;border:2px solid var(--line);background:#fff;padding:0;position:relative}
.figbtn:hover{border-color:var(--blue)}
.figbtn .fstage{font-size:25px}
.figpick{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.figopt{border:2px solid var(--line);border-radius:12px;background:#fff;padding:4px 2px 6px;
  display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.figopt .fwrap{width:100%;height:70px;position:relative;font-size:32px}
.figopt .flabel{font-size:12px;font-weight:700;color:#6E6248}
.figopt.sel{border-color:var(--red);background:#FDEDE8}
.figopt.sel .flabel{color:var(--red)}
.figopt.taken{opacity:.32;cursor:not-allowed;filter:grayscale(.85)}

/* 보드 위의 말 */
.token{
  position:relative;flex:none;
  width:2.7cqw;min-width:19px;max-width:30px;
  height:4.3cqw;min-height:29px;max-height:46px;
  font-size:2.7cqw;
}
.token .fgrp{animation:none;transform:rotateY(-24deg)}
.token.cur .fgrp{animation:figspin 5.5s linear infinite}
.token .fstage{perspective:220px}
.token .fgrp,.token .fpad{top:88%}
.token .fpad{background:radial-gradient(closest-side, rgba(0,0,0,.55), transparent 76%)}
.token.cur::before{
  content:'';position:absolute;left:50%;bottom:1px;width:1.35em;height:.46em;margin-left:-.675em;
  border-radius:50%;background:radial-gradient(closest-side, rgba(255,224,138,.95), transparent 76%);
  animation:glowpulse 1.1s ease-in-out infinite;
}
@keyframes glowpulse{0%,100%{opacity:.55;transform:scale(.9)}50%{opacity:1;transform:scale(1.15)}}
@keyframes tokhop{0%,100%{transform:translateY(0)}45%{transform:translateY(-24%)}}
.token.hop{animation:tokhop .17s ease-in-out}

/* ================================================================
   시각 이펙트 레이어
   ================================================================ */
#fx{position:fixed;inset:0;pointer-events:none;z-index:45;overflow:hidden}
.fxp{position:absolute;width:8px;height:13px;border-radius:2px;will-change:transform,opacity;
  animation:fxfall var(--d,900ms) cubic-bezier(.18,.62,.3,1) forwards}
@keyframes fxfall{
  0%{transform:translate3d(-50%,-50%,0) rotate(0);opacity:1}
  100%{transform:translate3d(calc(-50% + var(--dx)),calc(-50% + var(--dy)),0) rotate(var(--rz));opacity:0}
}
.fxf{position:absolute;font-weight:900;font-size:17px;white-space:nowrap;
  text-shadow:0 2px 7px rgba(0,0,0,.65), 0 0 2px rgba(0,0,0,.5);animation:fxrise 1150ms ease-out forwards}
@keyframes fxrise{
  0%{opacity:0;transform:translate(-50%,-40%) scale(.7)}
  16%{opacity:1;transform:translate(-50%,-62%) scale(1.1)}
  100%{opacity:0;transform:translate(-50%,-200%) scale(1)}
}
.fxf.big{font-size:24px}
.fxr{position:absolute;border-radius:50%;border:3px solid var(--c);transform:translate(-50%,-50%);
  animation:fxring 760ms ease-out forwards}
@keyframes fxring{0%{width:12px;height:12px;opacity:.95}100%{width:200px;height:200px;opacity:0}}
.fxs{position:absolute;width:7px;height:7px;border-radius:50%;background:var(--c);
  box-shadow:0 0 8px var(--c);animation:fxspark 720ms ease-out forwards}
@keyframes fxspark{
  0%{transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);opacity:0}
}
.fxflash{position:absolute;inset:0;background:radial-gradient(circle at 50% 45%, var(--c), transparent 70%);
  animation:fxfade 900ms ease-out forwards}
@keyframes fxfade{0%{opacity:.6}100%{opacity:0}}
.cell.flash{animation:cellflash .75s ease-out}
@keyframes cellflash{
  0%{box-shadow:inset 0 0 0 3px #FFE08A, 0 0 24px 5px rgba(255,224,138,.9)}
  100%{box-shadow:none}
}
.shaking{animation:shk .45s cubic-bezier(.36,.07,.19,.97)}
@keyframes shk{
  10%,90%{transform:translate3d(-2px,0,0)} 20%,80%{transform:translate3d(4px,0,0)}
  30%,50%,70%{transform:translate3d(-7px,0,0)} 40%,60%{transform:translate3d(7px,0,0)}
}
#diceTray.dbl{animation:dblglow .85s ease-out}
@keyframes dblglow{
  0%{box-shadow:inset 0 0 0 2px #FFD98A, 0 0 30px rgba(255,217,138,.65)}
  100%{box-shadow:none}
}
.keycard{animation:cardin .5s cubic-bezier(.2,.9,.3,1.2)}
@keyframes cardin{0%{transform:rotateY(85deg) scale(.86);opacity:0}100%{transform:none;opacity:1}}
#mBox{animation:boxin .26s cubic-bezier(.2,.9,.3,1.15)}
@keyframes boxin{0%{transform:translateY(14px) scale(.94);opacity:0}100%{transform:none;opacity:1}}
.pcard{transition:transform .18s ease, box-shadow .18s ease}
.pcard.now{transform:translateX(3px)}

/* ================================================================
   3D 물리 주사위 (터치로 위로 휙 던지기)
   ================================================================ */
#diceTray{
  position:relative;height:120px;height:19cqw;min-height:104px;max-height:140px;
  margin:2px 0 0;touch-action:none;user-select:none;-webkit-user-select:none;cursor:grab;
  border-radius:12px;
}
#diceTray.armed{
  background:radial-gradient(70% 90% at 50% 78%, rgba(255,224,150,.10), transparent 70%);
  box-shadow:inset 0 0 0 1px rgba(243,231,184,.16);
}
#diceTray.armed:active{cursor:grabbing}
#diceStage{position:absolute;inset:0;perspective:620px;perspective-origin:50% 42%}
#diceFloor{position:absolute;inset:0;transform-style:preserve-3d;transform:rotateX(66deg)}
#diceHint{
  position:absolute;left:0;right:0;bottom:1px;text-align:center;pointer-events:none;
  font-size:10.5px;font-size:1.62cqw;font-weight:700;letter-spacing:.02em;
  color:rgba(243,231,184,.62);opacity:0;transition:opacity .25s;
}
#diceTray.armed #diceHint{opacity:1;animation:hintpulse 1.6s ease-in-out infinite}
@keyframes hintpulse{0%,100%{opacity:.45;transform:translateY(0)}50%{opacity:.95;transform:translateY(-2px)}}

.d3{position:absolute;left:50%;top:50%;width:46px;height:46px;margin:-23px 0 0 -23px;transform-style:preserve-3d;will-change:transform}
.d3 .face{
  position:absolute;left:0;top:0;width:46px;height:46px;
  display:grid;grid-template:repeat(3,1fr)/repeat(3,1fr);padding:6px;
  background:linear-gradient(150deg,#FFFDF6,#EFE5C9);
  border-radius:9px;backface-visibility:hidden;
  box-shadow:inset 0 0 0 1px rgba(120,100,60,.30), inset 0 3px 6px rgba(255,255,255,.75), inset 0 -3px 6px rgba(0,0,0,.10);
}
.d3 .face span{display:flex;align-items:center;justify-content:center}
.d3 .face .pip{
  width:74%;aspect-ratio:1;margin:auto;border-radius:50%;
  background:radial-gradient(circle at 34% 30%, #3b3121, #191309);
  box-shadow:inset 0 -1px 1px rgba(255,255,255,.22), 0 1px 1px rgba(0,0,0,.28);
}
.d3 .face.f1 .pip{background:radial-gradient(circle at 34% 30%, #F0664F, #B22F1C);transform:scale(1.3)}
/* 정육면체 여섯 면 (반쪽 = 23px) */
.d3 .f1{transform:translateZ(23px)}
.d3 .f6{transform:rotateY(180deg) translateZ(23px)}

<script>
(() => {
'use strict';

/* ================= 유틸 ================= */
const $ = (id) => document.getElementById(id);
const fmt = (v) => {
  v = Math.round(v);
  const neg = v < 0; v = Math.abs(v);
  let s;
  if (v >= 10000) {
    const eok = Math.floor(v / 10000), man = v % 10000;
    s = man ? eok + '억 ' + man.toLocaleString('ko-KR') + '만' : eok + '억';
  } else s = v.toLocaleString('ko-KR') + '만';
  return (neg ? '-' : '') + s;
};
const esc = (t) => String(t).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ================= 사운드 (WebAudio 합성음) ================= */
let AC = null, muted = false;
function sfx(kind) {
  if (muted) return;
  try {
    AC = AC || new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    const t = AC.currentTime;
    const play = (f, dt, dur, type, vol) => {
      type = type || 'triangle'; vol = vol === undefined ? 0.12 : vol;
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t + dt);
      g.gain.linearRampToValueAtTime(vol, t + dt + 0.012);

/* ================= 배경음악 (WebAudio 합성, 외부 파일 없음) ================= */
let musicOn = false, musTimer = null, musGain = null, musNext = 0, musStep = 0;
const MUS_8TH = 60 / 88 / 2; /* 88 BPM 8분음표 길이(초) */
/* 코드 진행: C - G - Am - F (밝고 편안하며 매끄럽게 반복) */
const MUS = [
  { bass:130.81, pad:[261.63,329.63,392.00], arp:[261.63,329.63,392.00,523.25] }, /* C  */
  { bass: 98.00, pad:[196.00,293.66,392.00], arp:[293.66,392.00,493.88,587.33] }, /* G  */
  { bass:110.00, pad:[220.00,329.63,440.00], arp:[261.63,329.63,440.00,523.25] }, /* Am */
  { bass: 87.31, pad:[174.61,261.63,349.23], arp:[261.63,349.23,440.00,523.25] }  /* F  */
];
const ARP_SEQ = [0,1,2,3,2,3,1,2];
function ensureAC(){
  AC = AC || new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function musVoice(freq, at, dur, type, vol, atk){
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  atk = atk || 0.015;
  g.gain.setValueAtTime(0.0001, at);
  g.gain.linearRampToValueAtTime(vol, at + atk);
  g.gain.exponentialRampToValueAtTime(0.0001, at + dur);
  o.connect(g); g.connect(musGain);
  o.start(at); o.stop(at + dur + 0.05);
}
function musSchedule(){
  const bar = Math.floor(musStep / 8) % 4, pos = musStep % 8, ch = MUS[bar], t = musNext;
  musVoice(ch.arp[ARP_SEQ[pos]], t, MUS_8TH * 0.92, 'triangle', 0.05, 0.008);       /* 벨 아르페지오 */
  if (pos === 0 || pos === 4) musVoice(ch.bass, t, MUS_8TH * 1.9, 'sine', 0.11, 0.02); /* 베이스 */
  if (pos === 2 || pos === 6) musVoice(ch.bass * 1.5, t, MUS_8TH * 0.5, 'sine', 0.05, 0.01); /* 리듬 */
  if (pos === 0) ch.pad.forEach(f => musVoice(f, t, MUS_8TH * 7.4, 'sine', 0.03, 0.12));  /* 패드 코드 */
  musStep = (musStep + 1) % 32;
  musNext += MUS_8TH;
}
function musLoop(){ try { while (musNext < AC.currentTime + 0.25) musSchedule(); } catch (e) { stopMusic(); } }
function updateMusicBtn(){ const b = $('musicBtn'); if (b) b.classList.toggle('off', !musicOn); }
function startMusic(){
  if (musicOn) return;
  try {
    ensureAC();
    if (!musGain){ musGain = AC.createGain(); musGain.gain.value = 0; musGain.connect(AC.destination); }
    musicOn = true; musStep = 0; musNext = AC.currentTime + 0.12;
    const now = AC.currentTime;
    musGain.gain.cancelScheduledValues(now);
    musGain.gain.setValueAtTime(Math.max(0.0001, musGain.gain.value), now);
    musGain.gain.linearRampToValueAtTime(0.85, now + 0.9); /* 페이드 인 */
    musLoop();
    musTimer = setInterval(musLoop, 70);
  } catch (e) { musicOn = false; }
  updateMusicBtn();
}
function stopMusic(){
  musicOn = false;
  if (musTimer){ clearInterval(musTimer); musTimer = null; }
  try {
    if (musGain && AC){
      const now = AC.currentTime;
      musGain.gain.cancelScheduledValues(now);
      musGain.gain.setValueAtTime(musGain.gain.value, now);
      musGain.gain.linearRampToValueAtTime(0, now + 0.4); /* 페이드 아웃 */
    }
  } catch (e) {}
  updateMusicBtn();
}
function toggleMusic(){ if (musicOn) stopMusic(); else startMusic(); }

const PIPS = {1:[5],2:[3,7],3:[3,5,7],4:[1,3,7,9],5:[1,3,5,7,9],6:[1,3,4,6,7,9]};
const DIE_UNI = ['⚀','⚁','⚂','⚃','⚄','⚅'];   /* 미니게임용 주사위 눈 */
function setDie(el, face){

/* ================= 3D 피규어 말 ================= */
/* 모든 치수는 em 단위. 바깥에서 font-size 만 바꾸면 그대로 확대, 축소된다. */
const PIECES = [
  {k:'hat',    n:'실크햇',   ic:'🎩'},
  {k:'rocket', n:'로켓',     ic:'🚀'},
  {k:'crown',  n:'왕관',     ic:'👑'},
  {k:'gem',    n:'보석',     ic:'💎'},
  {k:'car',    n:'스포츠카', ic:'🚗'},
  {k:'die',    n:'주사위',   ic:'🎲'}
];
const IVORY = '#F4EEE0', DARK = '#2E2C32', GOLD = '#E0B341';
const emu = (v) => (Math.round(v*10000)/10000) + 'em';
const TR = (x,y,z) => 'translate3d('+emu(x)+','+emu(-y)+','+emu(z)+')';
/* 회전하는 피규어이므로 면 밝기는 모델에 고정된 스타일화된 광원으로 처리한다 */
const sideBright = (deg) => 0.66 + 0.56*(0.5 + 0.5*Math.cos((deg-35)*Math.PI/180));

function fFace(g, w, h, tf, col, b, cls){
  const d = document.createElement('div');
  d.className = 'fface' + (cls ? ' '+cls : '');
  d.style.width = emu(w); d.style.height = emu(h);
  d.style.marginLeft = emu(-w/2); d.style.marginTop = emu(-h/2);
  d.style.transform = tf; d.style.background = col;
  d.style.filter = 'brightness('+b.toFixed(3)+')';
  g.appendChild(d); return d;
}
function fTri(g, w, h, tf, col, b){
  const d = document.createElement('div');
  d.className = 'ftri';
  d.style.width = emu(w); d.style.height = emu(h);
  d.style.marginLeft = emu(-w/2); d.style.marginTop = '0';
  d.style.transform = tf; d.style.background = col;
  d.style.filter = 'brightness('+b.toFixed(3)+')';
  g.appendChild(d); return d;
}
function fDisc(g, r, tf, col, b){
  const d = fFace(g, 2*r, 2*r, tf, col, b, 'fdisc');
  return d;
}
/* 기둥: base 위치의 바닥 중심에서 위로 h 만큼 */
function addPrism(g, n, r, h, col, base, capTop, capBot){
  const a = r*Math.cos(Math.PI/n), w = 2*r*Math.sin(Math.PI/n);
  for(let i=0;i<n;i++){
    const th = i*360/n;
    fFace(g, w*1.03, h, base+' translateY('+emu(-h/2)+') rotateY('+th+'deg) translateZ('+emu(a)+')', col, sideBright(th));
  }
  if(capTop) fDisc(g, r, base+' translateY('+emu(-h)+') rotateX(90deg)', col, 1.24);
  if(capBot) fDisc(g, r, base+' rotateX(-90deg)', col, 0.5);
}
/* 원뿔: flip=false 면 꼭짓점이 위, true 면 아래 */
function addCone(g, n, r, h, col, base, flip){
  const a = r*Math.cos(Math.PI/n), w = 2*r*Math.sin(Math.PI/n);
  const L = Math.sqrt(h*h + a*a);
  const beta = Math.atan2(a, h) * 180/Math.PI;
  for(let i=0;i<n;i++){
    const th = i*360/n;
    const tf = flip
      ? base+' rotateY('+th+'deg) rotateX('+(180-beta).toFixed(3)+'deg)'
      : base+' translateY('+emu(-h)+') rotateY('+th+'deg) rotateX('+beta.toFixed(3)+'deg)';
    fTri(g, w*1.03, L, tf, col, sideBright(th));
  }
  fDisc(g, r, base+' translateY('+emu(flip?-h:0)+') rotateX(90deg)', col, flip?1.18:0.52);
}
/* 상자: base 위치의 바닥 중심에서 위로 h */
function addBox(g, w, d, h, col, base){
  const T = base+' translateY('+emu(-h/2)+') ';
  fFace(g, w, h, T+'translateZ('+emu(d/2)+')', col, 1.02);
  fFace(g, w, h, T+'rotateY(180deg) translateZ('+emu(d/2)+')', col, 0.70);
  fFace(g, d, h, T+'rotateY(90deg) translateZ('+emu(w/2)+')', col, 0.90);
  fFace(g, d, h, T+'rotateY(-90deg) translateZ('+emu(w/2)+')', col, 0.78);
  fFace(g, w, d, T+'rotateX(90deg) translateZ('+emu(h/2)+')', col, 1.20);
  fFace(g, w, d, T+'rotateX(-90deg) translateZ('+emu(h/2)+')', col, 0.48);
}
function addDieCube(g, s, col, base){
  const T = base+' translateY('+emu(-s/2)+') ';
  const put = (v, rot, b) => {
    const f = fFace(g, s, s, T+rot+' translateZ('+emu(s/2)+')', col, b, 'fdf');
    let h=''; for(let i=1;i<=9;i++) h += '<span class="'+(PIPS[v].indexOf(i)>=0?'pip':'')+'"></span>';
    f.innerHTML = h;
  };
  put(1,'',1.02); put(6,'rotateY(180deg)',0.70); put(3,'rotateY(90deg)',0.90);
  put(4,'rotateY(-90deg)',0.78); put(2,'rotateX(-90deg)',1.20); put(5,'rotateX(90deg)',0.48);
}

function buildFigure(kind, color){
  const g = document.createElement('div');
  g.className = 'fgrp';
  if(kind==='hat'){
    addPrism(g, 20, 0.62, 0.05, DARK, TR(0,0,0), false, true);   /* 챙 */
    addPrism(g, 16, 0.34, 0.88, DARK, TR(0,0.05,0), true, false);/* 통 */
    addPrism(g, 16, 0.356, 0.17, color, TR(0,0.11,0));           /* 리본 */
  } else if(kind==='rocket'){
    [0,120,240].forEach(ang=>{
      addBox(g, 0.05, 0.24, 0.32, color, 'rotateY('+ang+'deg) translateZ('+emu(0.22)+')');
    });
    addPrism(g, 14, 0.235, 0.95, IVORY, TR(0,0.02,0), false, true);
    addPrism(g, 14, 0.242, 0.18, color, TR(0,0.60,0));
    addCone(g, 14, 0.235, 0.44, color, TR(0,0.97,0), false);
  } else if(kind==='crown'){
    addPrism(g, 14, 0.40, 0.52, color, TR(0,0,0), false, true);
    addPrism(g, 14, 0.425, 0.09, GOLD, TR(0,0.50,0));
    for(let i=0;i<7;i++){
      const a = i*360/7 * Math.PI/180;
      addCone(g, 6, 0.095, 0.36, GOLD, TR(0.315*Math.cos(a), 0.58, 0.315*Math.sin(a)), false);
    }
  } else if(kind==='gem'){
    addCone(g, 8, 0.42, 0.62, color, TR(0,0,0), true);   /* 아래 뾰족 */
    addPrism(g, 8, 0.42, 0.08, color, TR(0,0.62,0));     /* 거들 */
    addCone(g, 8, 0.42, 0.34, color, TR(0,0.70,0), false);
  } else if(kind==='car'){
    addBox(g, 1.00, 0.46, 0.24, color, TR(0,0.09,0));
    addBox(g, 0.46, 0.40, 0.20, IVORY, TR(-0.06,0.33,0));
    [[0.32,0.25],[0.32,-0.25],[-0.32,0.25],[-0.32,-0.25]].forEach(w=>{
      addPrism(g, 10, 0.11, 0.07, DARK, TR(w[0],0.02,w[1])+' rotateZ(90deg)', true, true);
    });
  } else {
    addDieCube(g, 0.70, color, TR(0,0.02,0));
    addPrism(g, 18, 0.34, 0.04, DARK, TR(0,0,0), true, false);
  }
  return g;
}
function figureStage(kind, color, still){
  const st = document.createElement('div');
  st.className = 'fstage' + (still ? ' still' : '');
  const sc = document.createElement('div');
  sc.className = 'fscene';
  const pad = document.createElement('div');
  pad.className = 'fpad';
  sc.appendChild(pad);
  sc.appendChild(buildFigure(kind, color));
  st.appendChild(sc);
  return st;
}

/* 말 요소는 재사용한다. 매 칸마다 새로 만들면 회전 애니메이션이 끊기고 DOM 부하도 커진다. */
const TOKELS = {};
function renderTokens(){
  G.players.forEach(p=>{
    let el = TOKELS[p.i];
    if(!p.alive){
      if(el && el.parentNode) el.parentNode.removeChild(el);
      return;
    }
    const cur = (p.i===G.cur);
    if(!el){
      el = document.createElement('div');
      el.title = p.name;
      TOKELS[p.i] = el;
    }
    /* 피규어는 말이 바뀌거나 차례 상태가 바뀔 때만 다시 그린다 */
    if(el.dataset.fig !== p.piece+':'+cur){
      el.innerHTML = '';
      el.appendChild(figureStage(PIECES[p.piece].k, p.color, !cur));
      el.dataset.fig = p.piece+':'+cur;
    }
    el.className = 'token' + (cur ? ' cur' : '');
    const holder = document.querySelector('.cell[data-idx="'+p.pos+'"] .tokens');
    if(holder) holder.appendChild(el);
    if(cur && G.stepping && !REDUCED){
      el.classList.remove('hop');
      void el.offsetWidth;
      el.classList.add('hop');
    }
  });
}

/* 건물 단계별 통행료 배수: 빈 땅은 싸지만 지을수록 급격히 오른다.
   0채=기본(낮춤) → 별장 x2.2 → 빌딩 x4 → 호텔 x7 → 랜드마크 x13 (누적 아님, 최고 단계 적용) */
const TOLL_MULT = [1, 2.2, 4, 7, 13];
function bldLevel(sp){
  if(sp.bl.L) return 4;
  if(sp.bl.h) return 3;
  if(sp.bl.b) return 2;
  if(sp.bl.v) return 1;
  return 0;
}
/* ================= 특별 버프 (한 명에게만, 선착순) =================
   감옥 5회 → 범죄자 / 어린이집 3승 → CP enjoyer / 요양원 3승 → 박카스의 기운.
   세 버프 모두 최초로 조건을 만족한 '한 명'에게만 귀속된다. */
function claimSpecial(p){
  if(G.specialOwner === null) G.specialOwner = p.i;
  return G.specialOwner === p.i;
}
function isSpecialOwner(p){ return G.specialOwner === p.i; }

/* 감옥으로 보낸다. 범죄자는 즉시 통과. 5회째에 범죄자 버프 획득. */
function sendToJail(p, turns, cb){
  cb = cb || function(){};
  if(p.criminal){
    log('🦶 <b>'+esc(p.name)+'</b>은(는) 범죄자라 감옥을 그냥 지나칩니다.');
    cb(false);
    return;
  }
  p.jailCount = (p.jailCount || 0) + 1;
  p.island = turns;
  const becomeCriminal = (p.jailCount >= 5) && claimSpecial(p) && !p.criminal;
  teleport(p, ISLAND_IDX, false, ()=>{
    if(becomeCriminal){
      p.criminal = true;
      sfx('win');
      fxScreen('rgba(90,90,110,.55)');
      fxShake();
      log('🚔 <b>'+esc(p.name)+'</b>: <b>Dropped the soap</b> — 감옥에 5번 감으로써 당신의 아래는 강철이 되었습니다. <b>범죄자</b> 버프 획득!', 'big');
      modal('🚔 Dropped the soap',
        '<div class="keycard" style="background:#2b2b33;color:#f0f0f0"><div class="keytitle" style="color:#FFD98A">Dropped the soap</div>' +
        '<p>감옥에 5번 감으로써 당신의 아래는 강철이 되었습니다.</p>' +
        '<p class="hint" style="color:#cfc9b8">이제 <b>범죄자</b>입니다. 감옥에 걸려도 즉시 통과하고, 75만원을 넘는 통행료는 20% 할인받습니다.</p></div>',
        [{l:'확인', cls:'primary', fn:()=>cb(true)}], '#2b2b33');
      renderPlayers();
      return;
    }
    renderPlayers();
    cb(true);
  });
}

/* 통행료 최종액: 소유자 측 할증(박카스, 최후2인) 적용 후, 납부자가 범죄자면 75만원 초과분 할인 */
function finalToll(payer, owner, sp){
  let toll = calcToll(sp);
  /* 박카스의 기운: 소유 타일에 건물 2채 이상이면 통행료 20% 증가 */
  if(owner && owner.bhacks && sp.type==='city' && bldCount(sp) >= 2){
    toll = Math.round(toll * 1.2);
  }
  /* 최후 2인 통행료 버프 소유자 */
  if(owner && owner.tollBuff && owner.alive){
    toll += Math.round(toll * 0.25);
  }
  /* 범죄자: 75만원 초과 통행료 20% 할인 (올림) */
  if(payer && payer.criminal && toll > 75){
    toll = Math.ceil(toll * 0.8);
  }
  return toll;
}
function bldCount(sp){
  if(sp.type!=='city') return 0;
  return (sp.bl.v?1:0)+(sp.bl.b?1:0)+(sp.bl.h?1:0)+(sp.bl.L?1:0);
}

function calcToll(sp){
  if(sp.type==='veh') return sp.toll;
  const base = Math.round(sp.t[0] * 0.6);         /* 기본 지대 인하 */
  return Math.round(base * TOLL_MULT[bldLevel(sp)]);
}
function invested(sp){
  if(sp.type==='veh') return sp.price;
  return sp.price + sp.bl.v*sp.bc[0] + sp.bl.b*sp.bc[1] + sp.bl.h*sp.bc[2] + (sp.bl.L ? sp.price*2 : 0);
}
function ownedProps(p){
  const r=[]; SP.forEach((sp,i)=>{ if((sp.type==='city'||sp.type==='veh') && sp.owner===p.i) r.push(i); });
  return r;
}
function assets(p){
  return p.cash + ownedProps(p).reduce((s,i)=>s+invested(SP[i]),0);
}
function renderPlayers(){

      const sp=SP[i];

    const st = !p.alive ? '<span class="st dead">파산</span>' :
      p.trapped>0 ? '<span class="st isl">'+(p.trapIcon||'🏥')+' '+(p.trapName||'')+' '+p.trapped+'턴</span>' :
      p.cheongyeon>0 ? '<span class="st cy">청연 수업 '+p.cheongyeon+'턴</span>' :

      p.travel>0 ? '<span class="st trv">우주여행 대기</span>' : '';
    const items = (p.items.escape?'<span class="itm">🗝️ 탈출권 ×'+p.items.escape+'</span>':'') +
                  (p.items.pass?'<span class="itm">🎫 우대권 ×'+p.items.pass+'</span>':'') +

                  (p.leader?'<span class="itm" style="background:#FBEEDF;border-color:#E8C89A">👑 우세 월급3배</span>':'') +
                  (p.underdog?'<span class="itm" style="background:#E7EEFB;border-color:#B9CBEC">🔥 열세 통행료＋25%</span>':'') +
                  (p.criminal?'<span class="itm" style="background:#2b2b33;border-color:#555;color:#FFD98A">🚔 범죄자</span>':'') +

                  (p.bhacks?'<span class="itm" style="background:#2c1b3a;border-color:#5a3a7a;color:#D6A8FF">🥤 박카스의 기운</span>':'');
    const el = document.createElement('div');
    el.className = 'pcard' + (p.i===G.cur && p.alive ? ' now' : '') + (!p.alive ? ' dead' : '');
    el.innerHTML =
      '<div class="prow1"><span class="pdot" style="background:'+p.color+'">'+PIECES[p.piece].ic+'</span><b class="pname">'+esc(p.name)+'</b>'+st+'</div>' +

function fxOn(){ return !REDUCED && !!$('fx'); }
function fxPut(el, ms){
  const layer = $('fx');
  if(!layer) return;
  layer.appendChild(el);
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, ms);
}
function ctrOf(el){
  if(!el || !el.getBoundingClientRect) return null;
  const r = el.getBoundingClientRect();
  if(!r.width && !r.height) return null;
  return {x:r.left + r.width/2, y:r.top + r.height/2};
}
function cellPt(idx){ return ctrOf(document.querySelector('.cell[data-idx="'+idx+'"]')); }
function playerPt(p){
  const cell = document.querySelector('.cell[data-idx="'+p.pos+'"]');
  const tok = cell && cell.querySelector('.token');
  return ctrOf(tok) || cellPt(p.pos) || ctrOf($('board'));
}
function fxFloat(pt, text, kind, big){
  if(!fxOn() || !pt) return;
  const d = document.createElement('div');
  d.className = 'fxf' + (big ? ' big' : '');
  d.style.left = pt.x+'px'; d.style.top = pt.y+'px';
  d.style.color = kind==='pos' ? '#7BE8A6' : kind==='neg' ? '#FF9382' : '#FFE08A';
  d.textContent = text;
  fxPut(d, 1200);
}
function fxRing(pt, color){
  if(!fxOn() || !pt) return;
  const d = document.createElement('div');
  d.className = 'fxr';
  d.style.left = pt.x+'px'; d.style.top = pt.y+'px';
  d.style.setProperty('--c', color);
  fxPut(d, 800);
}
function fxSpark(pt, color, n){
  if(!fxOn() || !pt) return;
  for(let i=0;i<(n||10);i++){
    const a = Math.random()*Math.PI*2, r = 22 + Math.random()*44;
    const d = document.createElement('div');
    d.className = 'fxs';
    d.style.left = pt.x+'px'; d.style.top = pt.y+'px';
    d.style.setProperty('--c', color);
    d.style.setProperty('--dx', (Math.cos(a)*r).toFixed(1)+'px');
    d.style.setProperty('--dy', (Math.sin(a)*r).toFixed(1)+'px');
    d.style.animationDelay = (Math.random()*90).toFixed(0)+'ms';
    fxPut(d, 900);
  }
}
function fxConfetti(pt, colors, n){
  if(!fxOn() || !pt) return;
  for(let i=0;i<(n||28);i++){
    const a = -Math.PI/2 + (Math.random()-0.5)*2.2, v = 60 + Math.random()*150;
    const d = document.createElement('div');
    d.className = 'fxp';
    d.style.left = pt.x+'px'; d.style.top = pt.y+'px';
    d.style.background = colors[i % colors.length];
    d.style.setProperty('--dx', (Math.cos(a)*v).toFixed(1)+'px');
    d.style.setProperty('--dy', (Math.sin(a)*v + 130 + Math.random()*110).toFixed(1)+'px');
    d.style.setProperty('--rz', (Math.random()*900-450).toFixed(0)+'deg');
    d.style.setProperty('--d', (760 + Math.random()*520).toFixed(0)+'ms');
    if(Math.random()<0.35) d.style.borderRadius = '50%';
    fxPut(d, 1400);

}

function gain(p, amt, why){
  p.cash += amt;
  sfx('coin');
  const pt = playerPt(p);
  fxFloat(pt, '+'+fmt(amt), 'pos');
  fxSpark(pt, '#FFD86B', 9);
  log('💵 <b>'+esc(p.name)+'</b> '+why+' <b class="pos">+'+fmt(amt)+'원</b>');
  renderPlayers();
  checkEndgameSwap();
}
function paySalary(p, why){
  const m = p.salaryMult || 1;
  sfx('salary');
  gain(p, SALARY * m, (why || '월급') + (m > 1 ? ' ('+m+'배)' : ''));
}
function pay(from, amt, dest, why, cb){
  /* dest: 'bank' | 'fund' | 플레이어 객체 */
  const destName = dest==='bank' ? '은행' : dest==='fund' ? '사회복지기금' : dest.name;
  const settle = ()=>{
    const fromPt = playerPt(from);
    const toPt = (dest!=='bank' && dest!=='fund') ? playerPt(dest) : null;
    from.cash -= amt;
    if(dest==='fund') G.fund += amt;
    else if(dest!=='bank') dest.cash += amt;
    sfx('pay');
    fxFloat(fromPt, '-'+fmt(amt), 'neg');
    fxSpark(fromPt, '#FF8C7A', 7);
    if(toPt) fxFloat(toPt, '+'+fmt(amt), 'pos');
    log('💸 <b>'+esc(from.name)+'</b> → '+esc(destName)+' '+why+' <b class="neg">-'+fmt(amt)+'원</b>');
    renderAll();
    checkEndgameSwap();
    cb(true);
  };
  if(from.cash >= amt){ settle(); return; }
  const raiseMax = from.cash + ownedProps(from).reduce((s,i)=>s+Math.floor(invested(SP[i])/2),0);
  if(raiseMax < amt){
    modal('💥 파산 위기',
      '<p><b>'+esc(from.name)+'</b>이(가) '+why+'(으)로 <b>'+fmt(amt)+'원</b>을 내야 하지만, 모든 부동산을 처분해도 마련할 수 없습니다.</p>' +
      '<p>남은 재산은 <b>'+esc(destName)+'</b>(으)로 넘어갑니다.</p>',
      [{l:'파산 처리', cls:'danger', fn:()=>bankrupt(from, dest, cb)}], '#8C2F2F');
    return;
  }
  sellFlow(from, amt, why, settle);
}
function sellToBank(p, idx){
  const sp = SP[idx];
  const val = Math.floor(invested(sp)/2);
  sp.owner = null;
  if(sp.type==='city') sp.bl = {v:0,b:0,h:0,L:0};
  p.cash += val;
  sfx('coin');
  log('🏦 <b>'+esc(p.name)+'</b>이(가) <b>'+sp.name+'</b>을(를) 은행에 '+fmt(val)+'원에 매각했습니다.');
  renderAll();
}
function sellFlow(from, amt, why, onReady){
  const rerun = ()=>{
    const need = amt - from.cash;
    if(need <= 0){
      modal('자금 마련 완료',
        '<p>필요한 금액이 준비되었습니다.</p><p class="big-amt">'+why+': <b class="neg">'+fmt(amt)+'원</b></p>',
        [{l:'지불하기', cls:'primary', fn:onReady}]);
      return;
    }
    const rows = ownedProps(from).map(i=>{
      const sp = SP[i], val = Math.floor(invested(sp)/2);
      return '<div class="sellrow"><span class="chip" style="background:'+GROUPS[sp.g].c+'"></span>' +
        '<span class="srn">'+sp.name+bldStr(sp)+'</span>' +
        '<button class="btn mini" data-sell="'+i+'">'+fmt(val)+'원에 매각</button></div>';
    }).join('');
    modal('현금이 부족합니다',
      '<p><b>'+esc(from.name)+'</b>: '+why+' <b>'+fmt(amt)+'원</b> 중 <b class="neg">'+fmt(need)+'원</b>이 부족합니다.</p>' +
      '<p class="hint">부동산을 은행에 매각해 자금을 마련하세요. 매각가는 투자액의 절반입니다.</p>' +
      '<div class="selllist">'+rows+'</div>', [], '#8C2F2F');
    $('mBody').querySelectorAll('[data-sell]').forEach(btn=>{
      btn.onclick = ()=>{ sellToBank(from, parseInt(btn.dataset.sell,10)); rerun(); };
    });
  };
  rerun();
}
function bankrupt(from, dest, cb){
  from.alive = false;
  const cash = from.cash; from.cash = 0;
  const props = ownedProps(from);
  if(dest!=='bank' && dest!=='fund'){
    dest.cash += cash;
    props.forEach(i=>{ SP[i].owner = dest.i; });
    log('💥 <b>'+esc(from.name)+'</b> 파산! 남은 재산이 모두 <b>'+esc(dest.name)+'</b>에게 넘어갑니다.', 'big');
  } else {
    if(dest==='fund') G.fund += cash;
    props.forEach(i=>{ SP[i].owner = null; if(SP[i].type==='city') SP[i].bl = {v:0,b:0,h:0,L:0}; });
    log('💥 <b>'+esc(from.name)+'</b> 파산! 소유하던 부동산이 모두 매물로 풀립니다.', 'big');
  }
  from.items = {escape:0, pass:0};
  from.travel = 0; from.island = 0; from.cheongyeon = 0; from.trapped = 0; from.trapName=''; from.trapIcon='';
  from.leader = false; from.underdog = false; from.tollBuff = false; from.criminal = false; from.cpEnjoyer = false; from.bhacks = false;
  sfx('bad');
  fxShake();
  fxScreen('rgba(200,50,40,.55)');
  renderAll();
  checkEndgame();
  checkWinner();
  if(cb) cb(false);
}
function checkWinner(){
  const al = alivePlayers();
  if(al.length===1 && !G.over){
    G.over = true;
    const w = al[0];
    sfx('win');
    fxWin(w.color);

      '<p>최종 자산 <b>'+fmt(assets(w))+'원</b>, 총 '+G.turnNo+'턴 만의 승리입니다.</p>',
      [{l:'새 게임', cls:'primary', fn:()=>window.location.reload()}], '#B8860B');
  }
}

/* ================= 이동 ================= */
function stepMove(p, steps, cb){
  if(REDUCED){
    for(let s=0;s<steps;s++){ p.pos=(p.pos+1)%44; if(p.pos===0) paySalary(p); }
    renderTokens(); cb(); return;
  }
  let s = 0;
  G.stepping = true;
  const iv = setInterval(()=>{
    p.pos = (p.pos+1)%44;
    if(p.pos===0) paySalary(p);
    sfx('tick');
    renderTokens();
    s++;
    if(s>=steps){
      clearInterval(iv);
      G.stepping = false;
      renderTokens();
      fxFlashCell(p.pos);
      setTimeout(cb, 200);
    }
  }, 170);
}
function teleport(p, dest, giveSalary, cb){
  if(giveSalary && dest < p.pos) paySalary(p);
  const from = cellPt(p.pos);
  p.pos = dest;
  renderTokens();
  if(from) fxRing(from, p.color);
  fxRing(cellPt(dest), p.color);
  fxFlashCell(dest);
  setTimeout(cb, REDUCED ? 0 : 260);
}

/* ================= 턴 진행 ================= */
function beginTurn(){
  if(G.over) return;
  disarmFlick();
  G.pendingDouble = false; G.chain = 0;
  const p = curP();
  renderBanner(); renderPlayers(); renderTokens();
  log('<span class="turnline">── '+G.turnNo+'턴, <b style="color:'+p.color+'">'+esc(p.name)+'</b>의 차례 ──</span>');
  if(p.trapped > 0){ trappedTurn(p); return; }
  if(p.cheongyeon > 0){ cheongyeonTurn(p); return; }
  if(p.island > 0){ islandTurn(p); return; }
  if(p.travel > 0){ travelTurn(p); return; }
  rollTurn();
}
/* '윤성'이 이름에 들어간 플레이어는 요양원/어린이집에 걸리면 2턴 갇히고
   매 턴 1~50만원을 확률적으로 얻는다. */
function isYoonseong(p){ return (p.name || '').indexOf('윤성') >= 0; }
function trapReward(){ return 1 + Math.floor(Math.random()*50); }   /* 1 ~ 50만원 */
function yoonseongTrap(p, place, icon, done){
  if(!isYoonseong(p)) return false;
  p.trapped = 2; p.trapName = place; p.trapIcon = icon;
  log(icon+' <b>'+esc(p.name)+'</b>은(는) '+place+'에서 헤어나오지 못합니다. 2턴 동안 갇힙니다!');
  const amt = trapReward();
  gain(p, amt, place+' 봉사 사례');
  fxFlashCell(p.pos);
  modal(icon+' '+place+'에 붙잡히다',
    '<div class="keycard"><div class="keytitle">'+place+'</div>' +
    '<p><b>'+esc(p.name)+'</b>님은 정이 넘쳐 '+place+'을(를) 떠나지 못합니다.</p>' +
    '<p class="hint">앞으로 2턴 동안 이곳에 머무릅니다. 대신 매 턴 1만원에서 50만원까지 사례를 받습니다. (이번 턴 '+fmt(amt)+'만원)</p></div>',
    [{l:'확인', cls:'primary', fn:done}], '#2E7D46');
  renderPlayers();
  return true;
}
function trappedTurn(p){
  const amt = trapReward();
  gain(p, amt, (p.trapName || '봉사') + ' 사례');
  p.trapped--;
  const icon = p.trapIcon || '🏥';
  log(icon+' <b>'+esc(p.name)+'</b>: '+(p.trapName||'')+'에서 봉사하며 '+fmt(amt)+'만원을 받았습니다.' +
    (p.trapped>0 ? ' (남은 '+p.trapped+'턴)' : ' 드디어 나왔습니다!'));
  if(p.trapped===0){ p.trapName=''; p.trapIcon=''; }
  renderPlayers();
  setActions([{l:'턴 마치기 ➜', cls:'ghost', fn:endTurn}]);
}
function cheongyeonTurn(p){
  gain(p, 20, '청연 수업료');
  p.cheongyeon--;
  log('📐 <b>'+esc(p.name)+'</b>: "당신은 대치청연에서 여준영과 수학을 가르치고 있습니다." 20만원을 받았습니다.' + (p.cheongyeon>0 ? ' (남은 '+p.cheongyeon+'턴)' : ' 수업이 끝났습니다.'));
  renderPlayers();
  setActions([{l:'턴 마치기 ➜', cls:'ghost', fn:endTurn}]);
}
function concede(){
  if(G.over || !G.players.length) return;
  const p = curP();
  if(!p.alive){ return; }
  modal('🏳️ 기권',
    '<p><b>'+esc(p.name)+'</b>님이 기권하시겠습니까?</p>' +
    '<p class="hint">기권하면 즉시 파산 처리되어 게임에서 빠집니다. 소유하던 부동산은 모두 매물로 풀립니다.</p>',
    [
      {l:'🏳️ 기권하기', cls:'danger', fn:()=>{
        log('🏳️ <b>'+esc(p.name)+'</b>이(가) 기권을 선언했습니다.', 'big');
        bankrupt(p, 'bank', ()=>{
          if(G.over) return;
          if(!p.alive && G.cur===p.i){ endTurn(); }
          else beginTurn();
        });
      }},
      {l:'취소', cls:'ghost'}
    ], '#8C2F2F');
}
function endTurn(){
  if(G.over) return;
  G.pendingDouble = false; G.chain = 0;
  let i = G.cur;
  do { i = (i+1)%G.n; } while(!G.players[i].alive);
  G.cur = i; G.turnNo++;
  beginTurn();
}
function endOfAction(){
  if(G.over) return;
  const p = curP();
  if(!p.alive){ endTurn(); return; }
  if(G.pendingDouble && p.island===0 && p.cheongyeon===0){
    G.pendingDouble = false;
    log('🎲 더블 보너스! 한 번 더 굴립니다.');
    rollTurn();
    return;
  }
  disarmFlick();
  setActions([{l:'턴 마치기 ➜', cls:'ghost', fn:endTurn}]);
}

/* ================= 3D 물리 주사위 ================= */
/* 좌표계: 바닥면(rotateX 66deg)의 로컬 좌표. x=화면 오른쪽, y=바닥 안쪽(+가 앞), h=바닥에서의 높이 */
const DIE_PX = 46, HALF = DIE_PX / 2, REST_H = HALF;
const GRAV = 4200;        /* 중력 (px/s^2) */
const RESTITUTION = 0.34; /* 바닥 반발 계수 */
const WALL = 0.6;         /* 벽 반발 계수 */
const SETTLE_K = 14;      /* 면 정렬 토크 세기 */
const nowMs = () => (window.performance && performance.now) ? performance.now() : Date.now();
const RAF = window.requestAnimationFrame
  ? (f) => window.requestAnimationFrame(f)
  : (f) => setTimeout(f, 16);

/* --- 벡터, 쿼터니언 [w,x,y,z] --- */
const cross = (a,b) => [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
function qMul(a,b){
  return [
    a[0]*b[0]-a[1]*b[1]-a[2]*b[2]-a[3]*b[3],
    a[0]*b[1]+a[1]*b[0]+a[2]*b[3]-a[3]*b[2],
    a[0]*b[2]-a[1]*b[3]+a[2]*b[0]+a[3]*b[1],
    a[0]*b[3]+a[1]*b[2]-a[2]*b[1]+a[3]*b[0]
  ];
}
function qNorm(q){
  const n = Math.sqrt(q[0]*q[0]+q[1]*q[1]+q[2]*q[2]+q[3]*q[3]) || 1;
  return [q[0]/n,q[1]/n,q[2]/n,q[3]/n];
}
function qFromAxis(ax, ang){
  const s = Math.sin(ang/2);
  return qNorm([Math.cos(ang/2), ax[0]*s, ax[1]*s, ax[2]*s]);
}
function qRotVec(q, v){
  const t = cross([q[1],q[2],q[3]], v).map(c => c*2);
  const c2 = cross([q[1],q[2],q[3]], t);
  return [v[0]+q[0]*t[0]+c2[0], v[1]+q[0]*t[1]+c2[1], v[2]+q[0]*t[2]+c2[2]];
}
function randomQuat(){ /* Shoemake 균등 랜덤 회전 */
  const u1=Math.random(), u2=Math.random(), u3=Math.random();
  const s1=Math.sqrt(1-u1), s2=Math.sqrt(u1);
  return qNorm([s2*Math.cos(2*Math.PI*u3), s1*Math.sin(2*Math.PI*u2), s1*Math.cos(2*Math.PI*u2), s2*Math.sin(2*Math.PI*u3)]);
}
/* 면 법선: +Z=1, -Z=6, +X=3, -X=4, +Y=2, -Y=5 (마주보는 면의 합은 7) */
const FACE_Q = {
  1:[1,0,0,0],
  6:qFromAxis([1,0,0],  Math.PI),
  3:qFromAxis([0,1,0], -Math.PI/2),
  4:qFromAxis([0,1,0],  Math.PI/2),
  2:qFromAxis([1,0,0],  Math.PI/2),
  5:qFromAxis([1,0,0], -Math.PI/2)
};
function faceAxes(q){
  return [qRotVec(q,[1,0,0]), qRotVec(q,[0,1,0]), qRotVec(q,[0,0,1])];
}
/* 위를 향한 면의 눈금 (물리 결과가 곧 주사위 값) */
function readValue(q){
  const a = faceAxes(q), bx=a[0], by=a[1], bz=a[2];
  const cand = [[bz[2],1],[-bz[2],6],[bx[2],3],[-bx[2],4],[by[2],2],[-by[2],5]];
  let best = cand[0];
  for(const c of cand) if(c[0] > best[0]) best = c;
  return best[1];
}
/* 위를 향한 면의 법선 벡터 */
function upNormal(q){
  const a = faceAxes(q), bx=a[0], by=a[1], bz=a[2];
  const neg = (v)=>[-v[0],-v[1],-v[2]];
  const c = [bz, neg(bz), bx, neg(bx), by, neg(by)];
  let best = c[0];
  for(const v of c) if(v[2] > best[2]) best = v;
  return best;
}

let DICE = [];
function pipHTML(v){
  let h = '';
  for(let i=1;i<=9;i++) h += '<span class="'+(PIPS[v].indexOf(i)>=0?'pip':'')+'"></span>';
  return h;
}
function buildDice(){
  const floor = $('diceFloor');
  if(!floor) return;
  floor.innerHTML = ''; DICE = [];
  for(let i=0;i<2;i++){
    const sh = document.createElement('div');
    sh.className = 'dshadow';
    floor.appendChild(sh);
    const el = document.createElement('div');
    el.className = 'd3';
    let h = '';
    for(let v=1;v<=6;v++) h += '<div class="face f'+v+'">'+pipHTML(v)+'</div>';
    el.innerHTML = h;
    floor.appendChild(el);
    DICE.push({el:el, sh:sh, q:[1,0,0,0], x:(i?1:-1)*26, y:10, h:REST_H,
               vx:0, vy:0, vh:0, w:[0,0,0], bx:120, by:44, done:true, aligned:true, value:1, n:0});
  }
  showFaceStatic(DICE[0], 5, 0);
  showFaceStatic(DICE[1], 3, 1);
  const tray = $('diceTray');
  if(tray){
    tray.addEventListener('pointerdown', onDiceDown);
    tray.addEventListener('pointermove', onDiceMove);
    tray.addEventListener('pointerup', onDiceUp);
    tray.addEventListener('pointercancel', ()=>{ diceHold=false; samples=[]; });
  }
}
function dieRender(d){
  const q = qNorm(d.q);
  const w = Math.max(-1, Math.min(1, q[0]));
  const ang = 2*Math.acos(w);
  const s = Math.sqrt(Math.max(0, 1-w*w));
  let ax=1, ay=0, az=0;
  if(s > 1e-6){ ax=q[1]/s; ay=q[2]/s; az=q[3]/s; }
  d.el.style.transform = 'translate3d('+d.x.toFixed(2)+'px,'+d.y.toFixed(2)+'px,'+d.h.toFixed(2)+'px) ' +
    'rotate3d('+ax.toFixed(4)+','+ay.toFixed(4)+','+az.toFixed(4)+','+ang.toFixed(4)+'rad)';
  const t = Math.max(0, Math.min(1, (d.h-REST_H)/90));
  d.sh.style.transform = 'translate3d('+d.x.toFixed(2)+'px,'+d.y.toFixed(2)+'px,0.2px) scale('+(1.02-t*0.35).toFixed(3)+')';
  d.sh.style.opacity = (0.5-t*0.34).toFixed(3);
}
function showFaceStatic(d, v, i){
  d.q = FACE_Q[v].slice(); d.value = v; d.done = true; d.aligned = true; d.n = 0;
  d.x = (i?1:-1)*26; d.y = 10; d.h = REST_H;
  d.vx = d.vy = d.vh = 0; d.w = [0,0,0];
  dieRender(d);
}
function integrateQ(d, dt){
  const dq = qMul([0, d.w[0], d.w[1], d.w[2]], d.q);
  d.q = qNorm([d.q[0]+0.5*dq[0]*dt, d.q[1]+0.5*dq[1]*dt, d.q[2]+0.5*dq[2]*dt, d.q[3]+0.5*dq[3]*dt]);
}
/* 멈출 무렵 가장 위를 향한 면을 수평으로 눕히는 보정 토크 */
function settleTorque(d, dt){
  const n = upNormal(d.q);
  const dot = Math.max(-1, Math.min(1, n[2]));
  if(dot > 0.9985){
    d.aligned = true;
    d.w = [d.w[0]*0.3, d.w[1]*0.3, d.w[2]*0.3];
    return;
  }
  d.aligned = false;
  const ax = cross(n, [0,0,1]);
  const len = Math.sqrt(ax[0]*ax[0]+ax[1]*ax[1]+ax[2]*ax[2]) || 1;
  const k = Math.acos(dot) * SETTLE_K;
  d.w = [d.w[0]*0.35 + ax[0]/len*k, d.w[1]*0.35 + ax[1]/len*k, d.w[2]*0.35 + ax[2]/len*k];
}
const FIXED_DT = 1/180;      /* 고정 시간간격: 기기 성능과 무관하게 같은 결과 */
const DAMP_AT = 390, SNAP_AT = 720, DAMP_K = 0.98991;
let rigDice = null;          /* 관리자 모드에서 다음 굴림의 눈금을 지정 */
let simSilent = false;       /* 헤드리스 탐색 중에는 소리를 내지 않는다 */

function launchDie(d, i, flick){
  d.done = false; d.aligned = false; d.n = 0;
  d.q = randomQuat();                       /* 시작 자세부터 완전 무작위 */
  d.x = (i?1:-1)*20 + (Math.random()*10-5);
  d.y = d.by*0.62;
  d.h = REST_H + 2 + Math.random()*6;
  let sp;
  if(flick){
    sp = Math.max(400, Math.min(2600, flick.speed));
    d.vh = sp*0.30 + 220;                                   /* 튕긴 세기 = 던지는 높이 */
    d.vx = flick.vx*0.22 + (Math.random()*70-35);           /* 손가락 좌우 방향 반영 */
    d.vy = -Math.abs(flick.vy)*0.16 - 90 - Math.random()*60;
  } else {
    sp = 700 + Math.random()*700;
    d.vh = 520 + Math.random()*280;
    d.vx = Math.random()*260-130;
    d.vy = -150 - Math.random()*130;
  }
  const m = 6 + sp/300 + Math.random()*8;   /* 강한 무작위 스핀 → 결과 균등 무작위 */
  d.w = [(Math.random()*2-1)*m, (Math.random()*2-1)*m, (Math.random()*2-1)*m];
}
function stepDie(d, dt){
  if(d.done) return;
  d.n++;
  d.vh -= GRAV*dt;
  d.x += d.vx*dt; d.y += d.vy*dt; d.h += d.vh*dt;
  integrateQ(d, dt);
  if(d.x >  d.bx){ d.x =  d.bx; d.vx = -d.vx*WALL; }
  if(d.x < -d.bx){ d.x = -d.bx; d.vx = -d.vx*WALL; }
  if(d.y >  d.by){ d.y =  d.by; d.vy = -d.vy*WALL; }
  if(d.y < -d.by){ d.y = -d.by; d.vy = -d.vy*WALL; }
  let onFloor = false;
  if(d.h <= REST_H){
    d.h = REST_H; onFloor = true;
    if(d.vh < -45){
      if(Math.abs(d.vh) > 260 && !simSilent) sfx('tick');   /* 부딪히는 소리 */
      d.vh = -d.vh*RESTITUTION;
      const c = cross([0,0,1], [d.vx, d.vy, 0]);            /* 구르는 회전 부여 */
      const k = 1/(HALF*1.2);
      d.w = [d.w[0]*0.55 + c[0]*k, d.w[1]*0.55 + c[1]*k, d.w[2]*0.55 + c[2]*k];
    } else d.vh = 0;
    const f = 1 - Math.min(1, 6.5*dt);                      /* 바닥 마찰 */
    d.vx *= f; d.vy *= f;
  }
  const lin = Math.sqrt(d.vx*d.vx + d.vy*d.vy + d.vh*d.vh);
  const spin = Math.sqrt(d.w[0]*d.w[0] + d.w[1]*d.w[1] + d.w[2]*d.w[2]);
  if(onFloor){ const gd = 1-Math.min(1, 2.2*dt); d.w = [d.w[0]*gd, d.w[1]*gd, d.w[2]*gd]; } /* 회전 마찰 */
  if(onFloor && lin < 110 && spin < 9) settleTorque(d, dt);
  else { const ad = 1-1.2*dt; d.w = [d.w[0]*ad, d.w[1]*ad, d.w[2]*ad]; }
  if(d.n > DAMP_AT){                                        /* 수렴 보조 */
    d.vx *= DAMP_K; d.vy *= DAMP_K;
    d.w = [d.w[0]*DAMP_K, d.w[1]*DAMP_K, d.w[2]*DAMP_K];
  }
  if(d.n > SNAP_AT){ snapDie(d); return; }                  /* 안전망 */
  if(onFloor && lin < 8 && spin < 0.5 && d.aligned) snapDie(d);
}
function snapDie(d){
  const v = readValue(d.q);
  d.q = FACE_Q[v].slice(); d.value = v;
  d.h = REST_H; d.vx = d.vy = d.vh = 0; d.w = [0,0,0];
  d.done = true;
}
function dieSnap(d){ return {q:d.q.slice(), x:d.x, y:d.y, h:d.h, vx:d.vx, vy:d.vy, vh:d.vh, w:d.w.slice()}; }
function dieLoad(d, s){
  d.q = s.q.slice(); d.x = s.x; d.y = s.y; d.h = s.h;
  d.vx = s.vx; d.vy = s.vy; d.vh = s.vh; d.w = s.w.slice();
  d.n = 0; d.done = false; d.aligned = false;
}
function simToRest(d){
  let g = 0;
  while(!d.done && g < 900){ stepDie(d, FIXED_DT); g++; }
  if(!d.done) snapDie(d);
  return d.value;
}
/* 지정한 눈금이 실제로 나오는 초기 상태를 물리로 찾는다.
   결과를 나중에 덮어쓰는 것이 아니라, 그 눈금이 나오는 진짜 굴림을 골라 던진다. */
function findLaunch(i, flick, target, bx, by){
  const t = {q:[1,0,0,0], x:0, y:0, h:REST_H, vx:0, vy:0, vh:0, w:[0,0,0],
             bx:bx, by:by, done:false, aligned:false, value:1, n:0};
  const prev = simSilent; simSilent = true;
  let found = null;
  for(let a=0; a<900 && !found; a++){
    launchDie(t, i, flick);
    const snap = dieSnap(t);
    if(simToRest(t) === target) found = snap;
  }
  simSilent = prev;
  return found;
}
function startDiceSim(flick, done){
  const stage = $('diceStage');
  const W = (stage && stage.clientWidth) || 300;
  const H = (stage && stage.clientHeight) || 118;
  const rig = rigDice; rigDice = null;
  DICE.forEach((d,i)=>{
    d.bx = Math.max(24, W/2 - HALF - 4);
    d.by = Math.max(22, H*0.72);
    const snap = rig ? findLaunch(i, flick, rig[i], d.bx, d.by) : null;
    if(snap) dieLoad(d, snap); else launchDie(d, i, flick);
  });
  renderBanner();
  let last = nowMs(), acc = 0, fired = false;
  function loop(){
    const t = nowMs();
    let dt = (t-last)/1000; last = t;
    if(!(dt > 0)) dt = 0.016;
    if(dt > 0.05) dt = 0.05;
    acc += dt;
    let guard = 0;
    while(acc >= FIXED_DT && guard < 60){          /* 고정 스텝으로 결정론적 적분 */
      DICE.forEach(d=>stepDie(d, FIXED_DT));
      acc -= FIXED_DT; guard++;
    }
    DICE.forEach(dieRender);
    if(DICE.every(d=>d.done)){
      if(!fired){ fired = true; setTimeout(()=>done(DICE[0].value, DICE[1].value), 200); }
      return;
    }
    RAF(loop);
  }
  RAF(loop);
}

/* --- 던지기 흐름 (버튼 또는 위로 휙 튕기기) --- */
let rolling = false, diceArmed = null, diceHold = false, samples = [];
function setDiceHint(on){
  const tray = $('diceTray');
  if(tray) tray.classList.toggle('armed', !!on);
  const h = $('diceHint');
  if(h) h.textContent = on ? '👆 위로 휙 튕겨서 던지세요' : '';
}
function armFlick(resolve){ diceArmed = {resolve:resolve}; setDiceHint(true); }
function disarmFlick(){ diceArmed = null; diceHold = false; samples = []; setDiceHint(false); }
function runThrow(flick, done){
  if(REDUCED){
    const rig = rigDice; rigDice = null;
    const v1 = rig ? rig[0] : 1+Math.floor(Math.random()*6);
    const v2 = rig ? rig[1] : 1+Math.floor(Math.random()*6);
    showFaceStatic(DICE[0], v1, 0); showFaceStatic(DICE[1], v2, 1);
    renderBanner();
    setTimeout(()=>done(v1,v2), 240);
    return;
  }
  startDiceSim(flick, done);
}
function beginThrow(flick, resolve){
  if(rolling || !resolve) return;
  disarmFlick();
  rolling = true;
  setActions([]);
  sfx('dice');
  runThrow(flick, (a,b)=>{ rolling = false; resolve(a,b); });
}
function launchThrow(resolve){ beginThrow(null, resolve); }

function onDiceDown(e){
  if(!diceArmed || rolling) return;
  diceHold = true;
  samples = [{x:e.clientX, y:e.clientY, t:nowMs()}];
  try { if(e.target.setPointerCapture) e.target.setPointerCapture(e.pointerId); } catch(err){}
}
function onDiceMove(e){
  if(!diceHold) return;
  samples.push({x:e.clientX, y:e.clientY, t:nowMs()});
  if(samples.length > 6) samples.shift();
}
function onDiceUp(e){
  if(!diceHold) return;
  diceHold = false;
  if(!diceArmed || rolling){ samples = []; return; }
  samples.push({x:e.clientX, y:e.clientY, t:nowMs()});
  const a = samples[0], b = samples[samples.length-1];
  const dt = Math.max(0.016, (b.t-a.t)/1000);
  const vx = (b.x-a.x)/dt, vy = (b.y-a.y)/dt;   /* 화면 y는 위로 갈수록 감소 */
  samples = [];
  const speed = Math.sqrt(vx*vx + vy*vy);
  if(vy < -260 && speed > 300) beginThrow({vx:vx, vy:vy, speed:speed}, diceArmed.resolve);
}

/* --- 턴 주사위 --- */
function rollTurn(){
  const p = curP();
  p.travel = 0;
  const resolve = (d1,d2)=>resolveRoll(p,d1,d2);
  armFlick(resolve);
  setActions([{l:'🎲 던지기', cls:'primary', fn:()=>launchThrow(resolve)}]);
}
function resolveRoll(p, d1, d2){
  const dbl = d1===d2;
  if(dbl){ fxDouble(); fxFloat(ctrOf($('diceTray')), '더블!', 'gold', true); }
  log('🎲 <b>'+esc(p.name)+'</b>: '+d1+' + '+d2+' = <b>'+(d1+d2)+'</b>'+(dbl?' <b class="dblmark">더블!</b>':''));
  if(dbl){
    G.chain++;
    if(G.chain>=3){
      log('🚨 연속 더블 3회! <b>'+esc(p.name)+'</b>은(는) 즉시 감옥으로 이송됩니다.', 'big');
      G.pendingDouble = false;
      sendToJail(p, 3, ()=>{ renderAll(); setActions([{l:'턴 마치기 ➜', cls:'ghost', fn:endTurn}]); });
      return;
    }
    G.pendingDouble = true;
  } else {
    G.pendingDouble = false;
  }
  stepMove(p, d1+d2, ()=>resolveLanding(p, endOfAction));
}

/* ----- 감옥 ----- */
function islandTurn(p){
  log('🔒 <b>'+esc(p.name)+'</b>은(는) 감옥에 갇혀 있습니다. (남은 '+p.island+'턴)');
  const resolve = (d1,d2)=>resolveIslandRoll(p,d1,d2);
  armFlick(resolve);
  const acts = [{l:'🎲 더블에 도전', cls:'primary', fn:()=>launchThrow(resolve)}];
  if(p.items.escape > 0){
    acts.push({l:'🗝️ 탈출권 사용', cls:'alt', fn:()=>{
      disarmFlick();
      p.items.escape--;
      p.island = 0;
      const card = CARDS.filter(c=>c.k==='escape')[0];
      if(G.deck.indexOf(card)<0) G.deck.push(card);
      log('🗝️ <b>'+esc(p.name)+'</b>이(가) 보석 석방권을 사용했습니다!');
      renderPlayers();
      rollTurn();
    }});
  }
  setActions(acts);
}
function resolveIslandRoll(p, d1, d2){
  log('🎲 <b>'+esc(p.name)+'</b>: '+d1+' + '+d2+(d1===d2?' <b class="dblmark">더블!</b>':''));
  if(d1===d2){
    p.island = 0;
    log('🎉 더블! <b>'+esc(p.name)+'</b>이(가) 감옥에서 풀려납니다.');
    renderPlayers();
    stepMove(p, d1+d2, ()=>resolveLanding(p, endOfAction));
  } else {
    p.island--;
    if(p.island===0) log('⏳ 탈출 실패. 고립이 끝나 다음 차례부터 자유롭게 이동합니다.');
    else log('⏳ 석방 실패. 감옥에서 '+p.island+'턴 더 기다립니다.');
    renderPlayers();
    setActions([{l:'턴 마치기 ➜', cls:'ghost', fn:endTurn}]);
  }
}

/* ----- 우주여행 ----- */
function travelTurn(p){
  const ownerIdx = SP[SHUTTLE_IDX].owner;
  const free = p.travel===2 || ownerIdx===null || ownerIdx===p.i || p.cpEnjoyer;
  const feeTxt = free ? (p.cpEnjoyer && ownerIdx!==null && ownerIdx!==p.i ? 'CP enjoyer 면제' : '무료') : '이용료 '+fmt(SPACE_FEE)+'원을 '+esc(G.players[ownerIdx].name)+'에게 지불';
  log('🚀 <b>'+esc(p.name)+'</b>은(는) 우주여행을 이용할 수 있습니다. ('+feeTxt+')');
  const canUse = free || p.cash >= SPACE_FEE;
  setActions([
    {l:'🚀 우주여행 이용', cls:'alt', dis:!canUse, hint:'이용료가 부족합니다', fn:()=>{
      p.travel = 0;
      renderPlayers();
      if(free){ openTravelPicker(p); }
      else {
        pay(p, SPACE_FEE, G.players[ownerIdx], '우주여행 이용료', (ok)=>{
          if(ok) openTravelPicker(p); else endOfAction();
        });
      }
    }},
    {l:'🎲 그냥 주사위 굴리기', fn:()=>{ rollTurn(); }}
  ]);
}
function openTravelPicker(p){
  let rows = '';
  SP.forEach((sp,i)=>{
    if(i===p.pos) return;
    let sub = '';
    if(sp.type==='city' || sp.type==='veh'){
      sub = sp.owner===null ? fmt(sp.price) : (sp.owner===p.i ? '내 땅' : esc(G.players[sp.owner].name));
    }
    const col = (sp.type==='city'||sp.type==='veh') ? GROUPS[sp.g].c : '#8A8272';
    rows += '<button class="pick" data-go="'+i+'"><span class="pickband" style="background:'+col+'"></span>' +
      '<span class="pickn">'+sp.name+'</span><span class="picks">'+sub+'</span></button>';
  });
  modal('🚀 우주여행: 목적지 선택',
    '<p class="hint">앞으로 진행하는 이동으로 취급하며, 출발지를 지나면 월급을 받습니다.</p><div class="pickgrid">'+rows+'</div>',
    [{l:'취소하고 주사위 굴리기', cls:'ghost', fn:rollTurn}]);
  $('mBody').querySelectorAll('[data-go]').forEach(btn=>{
    btn.onclick = ()=>{
      closeModal();
      const dest = parseInt(btn.dataset.go,10);
      log('🚀 <b>'+esc(p.name)+'</b>이(가) <b>'+SP[dest].name+'</b>(으)로 우주여행을 떠납니다.');
      teleport(p, dest, true, ()=>resolveLanding(p, endOfAction));
    };
  });
}

/* ================= 도착 처리 ================= */
function resolveLanding(p, done){
  const sp = SP[p.pos];
  if(p.pos===HANOI_IDX){
    log('🧒 <b>황설희</b>: "용돈이다~" 하노이에서 <b>'+esc(p.name)+'</b>의 10만원을 가져갑니다.');
    sfx('coin');
    pay(p, 10, 'bank', '황설희 용돈', (ok)=>{ if(ok) routeLanding(p, sp, done); else done(); });
    return;
  }
  routeLanding(p, sp, done);
}
function routeLanding(p, sp, done){
  if(sp.type==='start'){ log('🏁 출발지에 도착했습니다.'); done(); return; }
  if(sp.type==='key'){ drawKey(p, done); return; }
  if(sp.type==='island'){
    sfx('jail');
    log('🔒 <b>'+esc(p.name)+'</b>이(가) 감옥에 갇혔습니다!');
    sendToJail(p, 3, ()=>{ renderPlayers(); done(); });
    return;
  }
  if(sp.type==='space'){
    p.travel = 1;
    sfx('space');
    log('🚀 우주여행 승강장! 다음 차례에 원하는 칸으로 이동할 수 있습니다.');
    renderPlayers(); done(); return;
  }
  if(sp.type==='fund'){
    if(G.fund>0){ const a=G.fund; G.fund=0; sfx('fundget'); gain(p, a, '사회복지기금 수령'); renderCells(); }
    else log('💰 사회복지기금 접수처. 아직 적립된 기금이 없습니다.');
    done(); return;
  }
  if(sp.type==='teleport'){ teleportCell(p, done); return; }
  if(sp.type==='cheongyeon'){
    p.cheongyeon = 2;
    sfx('coin');
    log('📐 <b>'+esc(p.name)+'</b>이(가) 청연에 도착했습니다. 여준영과 수학 수업을 시작합니다. (2턴)');
    modal('📐 청연',
      '<div class="keycard"><div class="keytitle">청연</div>' +
      '<p>당신은 대치청연에서 여준영과 수학을 가르치고 있습니다.</p>' +
      '<p class="hint">앞으로 2턴 동안 매 턴 20만원을 받습니다. 다만 감옥처럼 그동안은 자리를 뜰 수 없습니다.</p></div>',
      [{l:'확인', cls:'primary', fn:done}], '#B8860B');
    renderPlayers(); return;
  }
  if(sp.type==='care'){ if(yoonseongTrap(p, '요양원', '🏥', done)) return; nursingHome(p, done); return; }
  if(sp.type==='daycare'){ if(yoonseongTrap(p, '어린이집', '🧸', done)) return; daycare(p, done); return; }
  if(sp.owner===null){ offerBuy(p, sp, done); return; }
  if(sp.owner===p.i){
    if(sp.type==='city') offerBuild(p, sp, done);
    else { sfx('mine'); log('✨ 내 소유의 <b>'+sp.name+'</b>에 도착했습니다.'); done(); }
    return;
  }
  tollFlow(p, sp, done);
}

/* ----- 요양원: 가위바위보 3판 2선승 (3초 타이머, 비기지 않음) ----- */
function nursingHome(p, done){
  let pw = 0, hw = 0;
  const HANDS = [{k:'rock',e:'✊',n:'바위'},{k:'paper',e:'✋',n:'보'},{k:'scissors',e:'✌️',n:'가위'}];
  const beats = (a,b)=> (a==='rock'&&b==='scissors')||(a==='paper'&&b==='rock')||(a==='scissors'&&b==='paper');
  let timer = null;
  function clearTimer(){ if(timer){ clearInterval(timer); timer = null; } }

  function choose(){
    let left = 3, picked = null;
    const head = '<p class="hint">3초 안에 하나를 고르세요! 시간이 끝나면 어르신의 손이 공개됩니다. (비기면 그 판은 다시)</p>' +
      '<p class="scoreline">나 <b>'+pw+'</b> : <b>'+hw+'</b> 어르신</p>';
    modal('🏥 요양원 가위바위보',
      head +
      '<div class="mg-timer" id="rpsT">3</div>' +
      '<div class="rps-row">' + HANDS.map(h=>'<button class="rps-btn" data-h="'+h.k+'">'+h.e+'<span>'+h.n+'</span></button>').join('') + '</div>' +
      '<p class="mg-status" id="rpsMsg">무엇을 낼까요?</p>',
      [], '#2E7D46');
    const msg = ()=>$('rpsMsg'), tEl = ()=>$('rpsT');
    $('mBody').querySelectorAll('.rps-btn').forEach(b=>{
      b.onclick = ()=>{
        picked = b.dataset.h;
        $('mBody').querySelectorAll('.rps-btn').forEach(x=>x.classList.toggle('sel', x===b));
        if(msg()) msg().textContent = HANDS.find(h=>h.k===picked).n + '! 어르신의 손을 기다립니다…';
        sfx('rps');
      };
    });
    sfx('countdown');
    timer = setInterval(()=>{
      left--;
      if(tEl()){ tEl().textContent = left>0 ? left : '❔'; }
      if(left>0) sfx('countdown');
      if(left<=0){
        clearTimer();
        reveal(picked);
      }
    }, 1000);
  }
  function reveal(mine){
    /* 비기지 않도록: 어르신은 무승부가 아닌 손 중에서 뽑는다. 미선택 시 나에게 불리하게(어르신 승) */
    if(!mine){
      mine = HANDS[Math.floor(Math.random()*3)].k;   /* 임의 배정 후 어르신이 이기게 */
      const winning = HANDS.find(h=>beats(h.k, mine)).k;
      finishHand(mine, winning);
      return;
    }
    /* 어르신은 나를 이기거나 지는 손 중 무작위(비김 제외) */
    const notTie = HANDS.filter(h=>h.k!==mine).map(h=>h.k);
    const his = notTie[Math.floor(Math.random()*notTie.length)];
    finishHand(mine, his);
  }
  function finishHand(mine, his){
    const me = HANDS.find(h=>h.k===mine), he = HANDS.find(h=>h.k===his);
    const iWon = beats(mine, his);
    if(iWon) pw++; else hw++;
    sfx('reveal');
    const line = '<p class="mg-reveal">나 '+me.e+' &nbsp;vs&nbsp; '+he.e+' 어르신 — '+(iWon?'<b class="pos">승!</b>':'<b class="neg">패…</b>')+'</p>';
    if(pw>=2 || hw>=2){
      const won = pw>=2;
      sfx(won ? 'gamewin' : 'gamelose');
      modal('🏥 요양원 가위바위보',
        '<p class="scoreline">나 <b>'+pw+'</b> : <b>'+hw+'</b> 어르신</p>' + line +
        '<p class="mg-status">최종 <b>'+pw+' : '+hw+'</b> — '+(won?'승리! 20만원을 받습니다.':'패배… 15만원을 냅니다.')+'</p>',
        [{l:'확인', cls:'primary', fn:()=>settle(won)}], won ? '#2E7D46' : '#8C2F2F');
    } else {
      modal('🏥 요양원 가위바위보',
        '<p class="scoreline">나 <b>'+pw+'</b> : <b>'+hw+'</b> 어르신</p>' + line +
        '<p class="mg-status">다음 판으로!</p>',
        [{l:'다음 판 ➜', cls:'alt', fn:choose}], '#2E7D46');
    }
  }
  function settle(won){
    if(won){
      gain(p, 20, '요양원 가위바위보 승리');
      p.careWins = (p.careWins || 0) + 1;
      if(p.careWins >= 3 && !p.bhacks && claimSpecial(p)){
        p.bhacks = true;
        sfx('special'); fxScreen('rgba(120,60,160,.5)'); fxShake();
        log('🥤 <b>'+esc(p.name)+'</b>: 카스, 카스, 카스!! <b>박카스의 기운</b> 버프 획득!', 'big');
        renderPlayers();
        modal('🥤 카스, 카스, 카스!!',
          '<div class="keycard" style="background:#2c1b3a;color:#efe4f4"><div class="keytitle" style="color:#D6A8FF">카스, 카스, 카스!!</div>' +
          '<p>박카스 할머니들을 따라갔군요… 당신은 그곳에서 태윤성을 만나 특별한 기운을 받았습니다.</p>' +
          '<p class="hint" style="color:#d4c4e0">이제 <b>박카스의 기운</b>입니다. 건물이 2채 이상인 내 타일의 통행료가 20% 오릅니다.</p></div>',
          [{l:'확인', cls:'primary', fn:done}], '#2c1b3a');
        return;
      }
      done();
    } else {
      pay(p, 15, 'fund', '요양원 가위바위보 패배', ()=>done());
    }
  }
  choose();
}

/* ----- 어린이집: 주사위 대결 3판 2선승 (직접 굴리고, 비기지 않음) ----- */
function daycare(p, done){
  let pw = 0, cw = 0, round = 0;
  /* 비기지 않도록: 내 주사위는 1~6, 아이는 나와 다른 값에서 뽑는다 */
  function rollPair(){
    const me = 1 + Math.floor(Math.random()*6);
    let ch;
    do { ch = 1 + Math.floor(Math.random()*6); } while(ch === me);
    return [me, ch];
  }
  function board(topHTML, showBtn, faces){
    const dice = '<div class="mg-dice">' +
      '<div class="mg-side"><div class="mg-lab">나</div><div class="mg-face" id="mgMe">'+(faces?faces[0]:'?')+'</div></div>' +
      '<div class="mg-vs">VS</div>' +
      '<div class="mg-side"><div class="mg-lab">아이</div><div class="mg-face" id="mgCh">'+(faces?faces[1]:'?')+'</div></div></div>';
    modal('🧸 어린이집 주사위 대결',
      '<p class="hint">아이와 3판 2선승! 매 판 서로 주사위를 굴려 높은 수가 이깁니다. (비기면 다시 굴립니다)</p>' +
      '<p class="scoreline">나 <b>'+pw+'</b> : <b>'+cw+'</b> 아이</p>' + dice +
      (topHTML||''),
      showBtn ? [{l:'🎲 내 주사위 굴리기', cls:'alt', keep:true, fn:play}] : [], '#C9871A');
  }
  function play(){
    round++;
    const [md, cd] = rollPair();
    /* 내 주사위 굴리는 연출 */
    sfx('dice');
    let ticks = 0;
    const meEl = ()=>$('mgMe'), chEl = ()=>$('mgCh');
    board('<p class="mg-status">주사위를 굴리는 중…</p>', false, ['🎲','?']);
    const iv = setInterval(()=>{
      if(meEl()) meEl().textContent = '⚁⚂⚃⚄⚅⚀'[Math.floor(Math.random()*6)];
      ticks++;
      if(ticks >= 8){
        clearInterval(iv);
        if(meEl()) meEl().textContent = DIE_UNI[md-1];
        sfx('reveal');
        /* 아이 차례 */
        setTimeout(()=>{
          board('<p class="mg-status">아이가 주사위를 굴립니다…</p>', false, [DIE_UNI[md-1],'🎲']);
          let ct = 0;
          const iv2 = setInterval(()=>{
            if(chEl()) chEl().textContent = '⚁⚂⚃⚄⚅⚀'[Math.floor(Math.random()*6)];
            sfx('countdown');
            ct++;
            if(ct >= 7){
              clearInterval(iv2);
              if(chEl()) chEl().textContent = DIE_UNI[cd-1];
              sfx('reveal');
              const iWon = md > cd;
              if(iWon) pw++; else cw++;
              setTimeout(()=>finishRound(md, cd, iWon), 500);
            }
          }, 130);
        }, 450);
      }
    }, 90);
  }
  function finishRound(md, cd, iWon){
    const faces = [DIE_UNI[md-1], DIE_UNI[cd-1]];
    const line = iWon ? '<b class="pos">이겼습니다!</b>' : '<b class="neg">졌습니다!</b>';
    if(pw>=2 || cw>=2){
      const won = pw>=2;
      sfx(won ? 'gamewin' : 'gamelose');
      board('<p class="mg-status">'+line+' 최종 <b>'+pw+' : '+cw+'</b> — '+(won?'승리! 20만원을 받습니다.':'패배… 15만원을 냅니다.')+'</p>', false, faces);
      const bb = $('mBtns'); bb.innerHTML='';
      const el = document.createElement('button'); el.className='btn primary'; el.textContent='확인';
      el.onclick = ()=>{ closeModal(); settle(won); };
      bb.appendChild(el);
    } else {
      board('<p class="mg-status">'+line+' 다음 판을 이어갑니다.</p>', true, faces);
    }
  }
  function settle(won){
    if(won){
      gain(p, 20, '어린이집 주사위 승리');
      p.daycareWins = (p.daycareWins || 0) + 1;
      if(p.daycareWins >= 3 && !p.cpEnjoyer && claimSpecial(p)){
        p.cpEnjoyer = true;
        sfx('special'); fxScreen('rgba(180,60,60,.5)'); fxShake();
        log('🚨 <b>'+esc(p.name)+'</b>: 당신은 태윤성인가? <b>CP enjoyer</b> 버프 획득!', 'big');
        renderPlayers();
        modal('🚨 당신은 태윤성인가',
          '<div class="keycard" style="background:#3a1f1f;color:#f4e4e4"><div class="keytitle" style="color:#FF9382">당신은 태윤성인가</div>' +
          '<p>당신은 어린이들을 이기는 것을 좋아하는군요…. 지금 바로 태윤성을 연락하십시오.</p>' +
          '<p class="hint" style="color:#e0c4c4">이제 <b>CP enjoyer</b>입니다. 돈을 내야 하는 황금열쇠(반액대매출, 건물세 제외)와 우주왕복선 이용료를 면제받습니다.</p></div>',
          [{l:'확인', cls:'primary', fn:done}], '#3a1f1f');
        return;
      }
      done();
    } else {
      pay(p, 15, 'fund', '어린이집 주사위 패배', ()=>done());
    }
  }
  board('', true, null);
}

/* ----- 최후 2인 규칙 (버프 교체판) -----
   열세(underdog): 상대에게 받는 통행료 25% 할증 (역전의 무기)
   우세(leader): 월급 3배 + 우대권 2장 (굳히기)
   자산 우열이 뒤집히면 두 버프가 서로 자리를 바꾼다. */
function applyEndgameRoles(poor, rich, announce){
  poor.underdog = true;  poor.leader = false;
  rich.underdog = false; rich.leader = true;
  poor.tollBuff = true;  poor.salaryMult = 1;   /* 열세: 통행료 할증 */
  rich.tollBuff = false; rich.salaryMult = 3;   /* 우세: 월급 3배 */
  if(announce){
    rich.items.pass += 2;
    sfx('coin');
    fxScreen('rgba(122,62,158,.55)');
    fxShake();
    log('⚔️ 최후의 2인! <b>'+esc(poor.name)+'</b>(열세)에게 통행료 할증이, <b>'+esc(rich.name)+'</b>(우세)에게 월급 3배가 주어집니다.', 'big');
  }
  renderPlayers();
}
function endgameRanked(){
  const al = alivePlayers();
  if(al.length !== 2) return null;
  const a = al[0], b = al[1];
  return (assets(a) <= assets(b)) ? {poor:a, rich:b} : {poor:b, rich:a};
}
/* 매 자산 변동마다 우열이 바뀌었는지 확인하고 버프를 뒤바꾼다. */
function checkEndgameSwap(){
  if(!G.endgameApplied || G.over) return;
  const r = endgameRanked();
  if(!r) return;
  if(!r.poor.underdog || !r.rich.leader){
    const swapped = r.rich.underdog;   /* 직전 열세였던 사람이 우세로 올라섰나 */
    /* 우대권은 재부여하지 않도록 announce=false */
    applyEndgameRoles(r.poor, r.rich, false);
    if(swapped){
      sfx('win');
      fxScreen('rgba(255,214,102,.5)');
      log('🔄 역전! <b>'+esc(r.poor.name)+'</b>와(과) <b>'+esc(r.rich.name)+'</b>의 우열이 뒤바뀌어 버프가 서로 교체됩니다.', 'big');
    }
  }
}
function checkEndgame(){
  if(G.endgameApplied) return;
  const r = endgameRanked();
  if(!r) return;
  G.endgameApplied = true;
  applyEndgameRoles(r.poor, r.rich, true);
  modal('⚔️ 최후의 2인',
    '<p>이제 단둘이 남았습니다. 자산 격차에 따라 특별 규칙이 적용됩니다. <b>우열이 뒤바뀌면 두 혜택도 서로 교체됩니다.</b></p>' +
    '<p><span class="pdot sm" style="background:'+r.poor.color+'">'+PIECES[r.poor.piece].ic+'</span> <b>'+esc(r.poor.name)+'</b> <span class="hint">(자산 열세)</span><br>상대에게서 받는 <b>통행료를 25% 더</b> 징수합니다.</p>' +
    '<p><span class="pdot sm" style="background:'+r.rich.color+'">'+PIECES[r.rich.piece].ic+'</span> <b>'+esc(r.rich.name)+'</b> <span class="hint">(자산 우세)</span><br>우대권 2장을 받고, 앞으로 월급을 <b>3배</b>로 받습니다.</p>',
    [{l:'대결 시작', cls:'primary'}], '#7A3E9E');
}

function deedHTML(sp){
  if(sp.type==='veh'){
    return '<div class="deed"><div class="deedhead" style="background:'+GROUPS.vh.c+'">'+sp.name+'<span class="deedg">교통수단</span></div>' +
      '<table class="deedtbl"><tr><td>가격</td><td>'+fmt(sp.price)+'원</td></tr><tr><td>통행료 (고정)</td><td>'+fmt(sp.toll)+'원</td></tr></table></div>' +
      (SP.indexOf(sp)===SHUTTLE_IDX ? '<p class="hint">우주왕복선을 소유하면 우주여행 이용료 20만원이 소유자에게 들어옵니다.</p>' : '');
  }
  const g = GROUPS[sp.g];
  const tollAt = (lv)=>Math.round(Math.round(sp.t[0]*0.6) * TOLL_MULT[lv]);
  return '<div class="deed"><div class="deedhead" style="background:'+g.c+'">'+sp.name+'<span class="deedg">'+g.n+'</span></div>' +
    '<table class="deedtbl">' +
    '<tr><td>땅값</td><td>'+fmt(sp.price)+'원</td><td>기본 통행료</td><td>'+fmt(tollAt(0))+'원</td></tr>' +
    '<tr><td>별장 🏠</td><td>'+fmt(sp.bc[0])+'원</td><td>통행료</td><td>'+fmt(tollAt(1))+'원</td></tr>' +
    '<tr><td>빌딩 🏢</td><td>'+fmt(sp.bc[1])+'원</td><td>통행료</td><td>'+fmt(tollAt(2))+'원</td></tr>' +
    '<tr><td>호텔 🏨</td><td>'+fmt(sp.bc[2])+'원</td><td>통행료</td><td>'+fmt(tollAt(3))+'원</td></tr>' +
    '<tr class="fullr"><td colspan="2">🏰 랜드마크 통행료</td><td colspan="2">'+fmt(tollAt(4))+'원</td></tr>' +
    '</table></div>' +
    '<p class="hint">기본 지대는 낮지만 건물을 올릴수록 통행료가 급격히 뜁니다.</p>' +
    (sp.bl && sp.bl.L ? '<p class="hint">🏰 랜드마크 건설됨.</p>' : '');
}

function offerBuy(p, sp, done){
  const afford = p.cash >= sp.price;
  modal('매물: '+sp.name,
    deedHTML(sp) +

  const cost = sp.price * 2;
  const before = Math.round(Math.round(sp.t[0]*0.6) * TOLL_MULT[3]);   /* 호텔 단계 */
  const after = Math.round(Math.round(sp.t[0]*0.6) * TOLL_MULT[4]);    /* 랜드마크 단계 */
  const afford = p.cash >= cost;
  modal('🏰 랜드마크 건설: '+sp.name,

    '<div class="cashbar"><span class="pdot sm" style="background:'+p.color+'">'+PIECES[p.piece].ic+'</span> 보유 현금 <b class="'+(afford?'pos':'neg')+'">'+fmt(p.cash)+'원</b></div>' +
    (afford ? '' : '<p class="neg">건설비가 부족합니다.</p>'),
    [
      {l:'🏰 랜드마크 건설 ('+fmt(cost)+'원)', cls:'primary', dis:!afford, fn:()=>{
        p.cash -= cost;
        sp.bl.L = 1;
