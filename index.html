        renderAll();

      }},

function offerBuild(p, sp, done){
  const missing = [];
  if(!sp.bl.v) missing.push(0);
  if(!sp.bl.b) missing.push(1);
  if(!sp.bl.h) missing.push(2);
  if(missing.length===0){
    /* 풀하우스(별장+빌딩+호텔)면 랜드마크를 지을 수 있다 */
    if(!sp.bl.L){ offerLandmark(p, sp, done); return; }
    log('🏰 <b>'+sp.name+'</b>은(는) 랜드마크까지 완성되어 더 지을 것이 없습니다.'); done(); return;
  }
  /* 한 번에 한 채만: 다음 단계 건물 하나만 지을 수 있다 */
  const k = missing[0];
  const afford = p.cash >= sp.bc[k];
  const nextTollNow = calcToll(sp);
  const tmp = {type:'city', t:sp.t, bl:{v:sp.bl.v, b:sp.bl.b, h:sp.bl.h, L:sp.bl.L}};
  if(k===0) tmp.bl.v=1; else if(k===1) tmp.bl.b=1; else tmp.bl.h=1;
  const nextTollAfter = calcToll(tmp);
  modal('건설: '+sp.name,
    '<p class="hint">건물은 한 번에 한 채씩, 순서대로만 지을 수 있습니다. 다시 도착하면 다음 건물을 지을 수 있습니다.</p>' +
    '<div class="blist"><label class="brow"><span>'+BICONS[k]+' '+BNAMES[k]+' 건설</span><span class="bcost">'+fmt(sp.bc[k])+'원</span></label></div>' +
    '<p class="btotal">통행료 '+fmt(nextTollNow)+'원 → <b class="pos">'+fmt(nextTollAfter)+'원</b></p>' +
    '<div class="cashbar"><span class="pdot sm" style="background:'+p.color+'">'+PIECES[p.piece].ic+'</span> 보유 현금 <b class="'+(afford?'pos':'neg')+'">'+fmt(p.cash)+'원</b>'+(afford?'':' <b class="neg">(부족)</b>')+'</div>',
    [
      {l:BICONS[k]+' '+BNAMES[k]+' 건설 ('+fmt(sp.bc[k])+'원)', cls:'primary', dis:!afford, fn:()=>{
        p.cash -= sp.bc[k];
        if(k===0) sp.bl.v=1; else if(k===1) sp.bl.b=1; else sp.bl.h=1;
        sfx('build');
        const pt = cellPt(p.pos);
        fxConfetti(pt, [p.color, GROUPS[sp.g].c, '#FFD54A', '#fff'], 18);
        fxFlashCell(p.pos);
        log('🏗️ <b>'+esc(p.name)+'</b>이(가) <b>'+sp.name+'</b>에 '+BNAMES[k]+'을(를) 지었습니다. 통행료 '+fmt(nextTollAfter)+'원 <b class="neg">-'+fmt(sp.bc[k])+'원</b>');
        renderAll();
        done();
      }},
      {l:'짓지 않기', cls:'ghost', fn:done}
    ], GROUPS[sp.g].c);
}

function deedShort(sp, owner, toll){
  return '<p><b>'+sp.name+'</b>'+bldStr(sp)+'은(는) <span class="pdot sm" style="background:'+owner.color+'">'+(owner.i+1)+'</span> <b>'+esc(owner.name)+'</b> 소유입니다.</p>' +
    '<p class="big-amt">통행료 <b class="neg">'+fmt(toll)+'원</b></p>';
}
function tollFlow(p, sp, done){
  const owner = G.players[sp.owner];
  const toll = finalToll(p, owner, sp);
  const proceed = ()=>{
    sfx(toll > 20 ? 'renthigh' : 'rentlow');
    pay(p, toll, owner, sp.name+' 통행료', (ok)=>{
      if(!ok){ done(); return; }
      maybeTakeover(p, sp, owner, done);
    });
  };
  if(p.items.pass > 0){
    modal('통행료: '+sp.name,
      deedShort(sp, owner, toll) + '<p>우대권을 사용해 통행료를 면제받을 수 있습니다.</p>',
      [
        {l:'🎫 우대권 사용', cls:'alt', fn:()=>{
          p.items.pass--;
          const card = CARDS.filter(c=>c.k==='pass')[0];
          if(G.deck.indexOf(card)<0) G.deck.push(card);
          log('🎫 <b>'+esc(p.name)+'</b>이(가) 우대권으로 <b>'+sp.name+'</b> 통행료 '+fmt(toll)+'원을 면제받았습니다!');
          renderPlayers();
          done();
        }},
        {l:'지불하기 ('+fmt(toll)+'원)', cls:'primary', fn:proceed}
      ], '#8C2F2F');
    return;
  }
  modal('통행료: '+sp.name, deedShort(sp, owner, toll),
    [{l:'지불하기 ('+fmt(toll)+'원)', cls:'primary', fn:proceed}], '#8C2F2F');
}
function maybeTakeover(p, sp, owner, done){
  const noBld = sp.type==='city' && !sp.bl.v && !sp.bl.b && !sp.bl.h;
  const cost = sp.price*2;
  if(!G.opts.takeover || !noBld || !owner.alive || !p.alive || p.cash < cost){ done(); return; }
  modal('인수 기회: '+sp.name,
    deedHTML(sp) + '<p>건물이 없는 도시입니다. 땅값의 2배인 <b>'+fmt(cost)+'원</b>을 <b>'+esc(owner.name)+'</b>에게 지불하고 인수할 수 있습니다.</p>',
    [
      {l:'인수하기 ('+fmt(cost)+'원)', cls:'primary', fn:()=>{
        p.cash -= cost;
        owner.cash += cost;
        sp.owner = p.i;
        sfx('buy');
        log('🤝 <b>'+esc(p.name)+'</b>이(가) <b>'+esc(owner.name)+'</b>의 <b>'+sp.name+'</b>을(를) '+fmt(cost)+'원에 인수했습니다!', 'big');
        renderAll();
        done();
      }},
      {l:'괜찮습니다', cls:'ghost', fn:done}
    ], GROUPS[sp.g].c);
}

function drawKey(p, done){
  const c = G.deck.shift();
  if(!c.keep) G.deck.push(c);
  sfx('card');
  fxSpark(cellPt(p.pos), '#E0B341', 14);
  fxFlashCell(p.pos);
  modal('🔑 황금열쇠',

}
/* 복권: 1 ~ 500만원.
   3% 확률로 450~500만원 대박, 나머지 97%는 1~449만원을 로그 스케일로 흩뿌려 대부분 소액. */
function lottoDraw(){
  if(Math.random() < 0.03){
    return 450 + Math.floor(Math.random()*51);          /* 450 ~ 500 균등 (전체의 약 3%) */
  }
  const u = Math.random();
  const amt = Math.pow(449, Math.pow(u, 2.6));
  return Math.min(449, Math.max(1, Math.round(amt)));
}
function applyCard(p, c, done){
  if(c.k==='world'){
    paySalary(p, '세계일주 월급');
    if(G.fund>0){ const a=G.fund; G.fund=0; gain(p, a, '사회복지기금 수령'); renderCells(); }
    done();
  } else if(c.k==='island'){
    sendToJail(p, 3, ()=>{
      log('🔒 <b>'+esc(p.name)+'</b>이(가) 감옥에 갇혔습니다.');
      renderPlayers(); done();
    });
  } else if(c.k==='space'){
    teleport(p, SPACE_IDX, true, ()=>{
      p.travel = 2;
      log('🚀 우주여행 승강장으로 이동했습니다. 다음 차례에 무료로 원하는 칸에 갈 수 있습니다.');
      renderPlayers(); done();
    });
  } else if(c.k==='goto'){
    teleport(p, c.to, true, ()=>resolveLanding(p, done));
  } else if(c.k==='fundgo'){
    teleport(p, FUND_IDX, true, ()=>{
      if(G.fund>0){ const a=G.fund; G.fund=0; gain(p, a, '사회복지기금 수령'); renderCells(); }
      else log('💰 접수처에 도착했지만 적립된 기금이 없습니다.');
      done();
    });
  } else if(c.k==='back'){
    p.pos = (p.pos + 44 - c.n) % 44;
    renderTokens();
    setTimeout(()=>resolveLanding(p, done), REDUCED ? 0 : 260);
  } else if(c.k==='gain'){
    gain(p, c.a, c.t);
    done();
  } else if(c.k==='lotto'){
    sfx('lotto');
    const amt = lottoDraw();
    const grand = amt >= 400;
    if(grand){ sfx('win'); fxScreen('rgba(255,214,102,.55)'); fxConfetti(playerPt(p), ['#FFD54A','#FF7A59','#6FD3A0','#5FA8E8','#fff'], 40); }
    gain(p, amt, '복권 당첨');
    modal('🎟️ 복권 추첨',
      '<div class="keycard"><div class="keytitle">복권 추첨</div>' +
      '<p class="big-amt">'+(grand?'🎉 ':'')+'당첨금 <b class="pos">'+fmt(amt)+'만원</b>'+(grand?' 🎉':'')+'</p>' +
      '<p class="hint">'+(amt>=400?'전설적인 대박입니다!':amt>=100?'제법 큰 행운이네요.':amt>=30?'쏠쏠한 당첨입니다.':'소소하지만 공돈입니다.')+'</p></div>',
      [{l:'확인', cls:'primary', fn:done}], grand ? '#B8860B' : '#2E7D46');
  } else if(c.k==='pay'){
    if(p.cpEnjoyer){
      log('🚨 <b>'+esc(p.name)+'</b>(CP enjoyer): '+c.t+' '+fmt(c.a)+'만원 납부를 면제받았습니다.');
      done();
    } else {
      pay(p, c.a, 'fund', c.t, ()=>done());
    }
  } else if(c.k==='perb'){
    let v=0,b=0,h=0;
    SP.forEach(sp=>{ if(sp.type==='city' && sp.owner===p.i){ v+=sp.bl.v; b+=sp.bl.b; h+=sp.bl.h; } });
    const total = v*c.f[0] + b*c.f[1] + h*c.f[2];
    if(total===0){ log('🏚️ 보유한 건물이 없어 낼 금액이 없습니다.'); done(); }
    else pay(p, total, 'fund', c.t+' (별장 '+v+', 빌딩 '+b+', 호텔 '+h+')', ()=>done());
  } else if(c.k==='escape'){
    p.items.escape++;
    log('🗝️ 보석 석방권을 획득했습니다.');
    renderPlayers(); done();
  } else if(c.k==='pass'){
    p.items.pass++;
    log('🎫 우대권을 획득했습니다.');
    renderPlayers(); done();
  } else if(c.k==='bday'){
    birthdayChain(p, alivePlayers().filter(x=>x.i!==p.i), done);
  } else if(c.k==='halfsale'){
    halfSale(p, done);
  } else {
    done();
  }
}
function birthdayChain(p, payers, done){
  if(payers.length===0){ done(); return; }
  const payer = payers[0];
  pay(payer, 5, p, esc(p.name)+' 생일 축하금', ()=>birthdayChain(p, payers.slice(1), done));
}
function halfSale(p, done){
  const props = ownedProps(p);
  if(props.length===0){
    modal('반액 대매출', '<p>매각할 부동산이 없어 그냥 넘어갑니다. 다행이네요!</p>',
      [{l:'확인', cls:'primary', fn:done}], '#8C2F2F');
    return;
  }
  const rows = props.map(i=>{
    const sp = SP[i], val = Math.floor(invested(sp)/2);
    return '<button class="pick" data-hs="'+i+'"><span class="pickband" style="background:'+GROUPS[sp.g].c+'"></span>' +
      '<span class="pickn">'+sp.name+bldStr(sp)+'</span><span class="picks">'+fmt(val)+'원</span></button>';
  }).join('');
  modal('반액 대매출',
    '<p>소유한 부동산 하나를 골라 은행에 <b>투자액의 절반</b> 가격으로 매각해야 합니다.</p><div class="pickgrid one">'+rows+'</div>',
    [], '#8C2F2F');
  $('mBody').querySelectorAll('[data-hs]').forEach(btn=>{
    btn.onclick = ()=>{ closeModal(); sellToBank(p, parseInt(btn.dataset.hs,10)); done(); };
  });
}

function admRefresh(){ renderAll(); renderBanner(); openAdmin(); }

function unlockAdmin(){
  if(ADMIN){ openAdmin(); return; }
  ADMIN = true;
  document.body.classList.add('admin-on');
  const b = document.createElement('button');
  b.id = 'adminBtn'; b.className = 'icon-btn'; b.title = '관리자 패널'; b.textContent = '🛠️';
  b.addEventListener('click', openAdmin);
  const tools = document.querySelector('.side-head .tools');
  if(tools) tools.insertBefore(b, tools.firstChild);
  sfx('win');
  fxScreen('rgba(255,214,102,.35)');
  admLog('모드가 열렸습니다. 우측 상단 🛠️ 버튼으로 언제든 다시 열 수 있습니다.');
  openAdmin();
}

        (p.alive?'생존':'<b class="neg">탈락</b>')+'</div>' +

      '<div class="adm-sec"><h5>💰 현금과 기금</h5>' +

          '<button class="btn sm" data-a="cashSet">설정</button>' +
          '<button class="btn sm alt" data-a="cashAdd">＋ 지급</button>' +
          '<button class="btn sm danger" data-a="cashSub">－ 차감</button></div>' +
        '<div class="adm-row"><input id="admFund" type="number" value="'+G.fund+'" step="10">' +
          '<button class="btn sm" data-a="fundSet">기금 설정</button>' +
          '<button class="btn sm alt" data-a="fundGive">기금 전액 몰수 →</button></div>' +
      '</div>' +

      '<div class="adm-sec"><h5>📦 재산 이전과 파산</h5>' +
        (otherOpts ? '<div class="adm-row"><span class="lbl">전액 이전 →</span><select id="admTo">'+otherOpts+'</select>' +
          '<button class="btn sm alt" data-a="transfer">현금과 부동산 전부 넘기기</button></div>' : '') +
        '<div class="adm-row"><span class="lbl">파산 처리</span><select id="admDest">'+destOpts+'</select>' +
          '<button class="btn sm danger" data-a="bankrupt">파산시키기</button></div>' +
        '<div class="adm-row"><button class="btn sm" data-a="revive">되살리기</button>' +
          '<button class="btn sm" data-a="unover">승부 취소 (게임 계속)</button></div>' +
      '</div>' +

      '<div class="adm-sec"><h5>🏙️ 부동산</h5>' +
        '<div class="adm-row"><select id="admProp">'+propOpts+'</select>' +
          '<button class="btn sm alt" data-a="own">이 참가자 소유로</button>' +
          '<button class="btn sm" data-a="unown">매물로 되돌리기</button></div>' +
        '<div class="adm-row"><span class="lbl">건물</span>' +
          '<button class="btn sm" data-a="bl-v">🏠 별장</button>' +
          '<button class="btn sm" data-a="bl-b">🏢 빌딩</button>' +
          '<button class="btn sm" data-a="bl-h">🏨 호텔</button>' +
          '<button class="btn sm" data-a="bl-L">🏰 랜드마크</button>' +
          '<button class="btn sm danger" data-a="bl-clear">전부 철거</button></div>' +
        '<div class="hintline">건물 버튼은 누를 때마다 켜고 끕니다. 도시에만 적용됩니다.</div>' +
      '</div>' +

      '<div class="adm-sec"><h5>📍 위치와 상태</h5>' +
        '<div class="adm-row"><select id="admMove">'+cellOpts+'</select>' +
          '<button class="btn sm alt" data-a="move">이동</button>' +
          '<button class="btn sm" data-a="moveSal">이동 + 월급</button></div>' +
        '<div class="adm-row">' +
          '<button class="btn sm" data-a="island">🔒 감옥 3턴</button>' +
          '<button class="btn sm" data-a="free">감옥 해제</button>' +
          '<button class="btn sm" data-a="cheong">📐 청연 2턴</button>' +
          '<button class="btn sm" data-a="travel">🚀 우주여행권</button></div>' +
      '</div>' +

      '<div class="adm-sec"><h5>🎁 아이템과 특전</h5>' +
        '<div class="adm-row">' +
          '<button class="btn sm" data-a="escape">🗝️ 탈출권 ＋1</button>' +
          '<button class="btn sm" data-a="pass">🎫 우대권 ＋1</button>' +
          '<button class="btn sm danger" data-a="noitem">아이템 비우기</button></div>' +
        '<div class="adm-row"><span class="lbl">월급 배수</span>' +
          '<button class="btn sm" data-a="sal1">1배</button>' +
          '<button class="btn sm" data-a="sal2">2배</button>' +
          '<button class="btn sm" data-a="sal3">3배</button>' +
          '<button class="btn sm alt" data-a="leader">👑 우세 '+(p.leader?'끄기':'켜기')+'</button>' +
          '<button class="btn sm" data-a="underdog">🔥 열세 '+(p.underdog?'끄기':'켜기')+'</button></div>' +
      '</div>' +

      '<div class="adm-sec"><h5>🎲 주사위와 차례</h5>' +
        '<div class="adm-row"><span class="lbl">다음 굴림</span>' +
          '<select id="admD1">'+dieOpts(rigDice?rigDice[0]:1)+'</select>' +
          '<select id="admD2">'+dieOpts(rigDice?rigDice[1]:1)+'</select>' +
          '<button class="btn sm alt" data-a="rig">눈금 고정</button>' +
          '<button class="btn sm" data-a="unrig">해제</button></div>' +
        '<div class="hintline">고정해도 결과를 덮어쓰지 않습니다. 그 눈금이 실제로 나오는 굴림을 물리로 찾아서 던집니다.</div>' +
        '<div class="adm-row">' +
          '<button class="btn sm" data-a="turn">이 참가자 차례로</button>' +
          '<button class="btn sm" data-a="skip">차례 넘기기</button>' +

      '</div>' +
    '</div>';

  modal('🛠️ 관리자 패널', body, [{l:'닫기', cls:'ghost'}], '#3B3B44');

  /* 참가자 선택 버튼 */
  const pl = $('admPl');
  G.players.forEach(x=>{
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'pbtn' + (x.i===admSel ? ' on' : '') + (x.alive ? '' : ' dead');
    b.innerHTML = '<span class="pdot sm" style="background:'+x.color+'">'+PIECES[x.piece].ic+'</span>' + esc(x.name);
    b.addEventListener('click', ()=>{ admSel = x.i; openAdmin(); });
    pl.appendChild(b);
  });

  $('mBody').querySelectorAll('[data-a]').forEach(b=>{
    b.addEventListener('click', ()=>admAction(b.dataset.a));
  });
  const mv = $('admMove'); if(mv) mv.value = String(p.pos);
}

function admAction(a){
  if(!ADMIN) return;
  const p = G.players[admSel];
  const num = (id, def)=>{ const e = $(id); const v = e ? parseInt(e.value,10) : NaN; return isNaN(v) ? def : v; };

  if(a==='cashSet'){ const v = Math.max(0, num('admCash',0)); p.cash = v; admLog(esc(p.name)+'의 현금을 <b>'+fmt(v)+'원</b>으로 설정'); }
  else if(a==='cashAdd'){ const v = Math.max(0, num('admCash',0)); p.cash += v; sfx('coin'); fxFloat(playerPt(p),'+'+fmt(v),'pos'); admLog(esc(p.name)+'에게 <b class="pos">+'+fmt(v)+'원</b>'); }
  else if(a==='cashSub'){ const v = Math.max(0, num('admCash',0)); p.cash = Math.max(0, p.cash-v); sfx('pay'); fxFloat(playerPt(p),'-'+fmt(v),'neg'); admLog(esc(p.name)+'에게서 <b class="neg">-'+fmt(v)+'원</b>'); }
  else if(a==='fundSet'){ G.fund = Math.max(0, num('admFund',0)); admLog('사회복지기금을 <b>'+fmt(G.fund)+'원</b>으로 설정'); }
  else if(a==='fundGive'){
    const v = G.fund; if(v<=0){ admLog('기금이 비어 있습니다.'); } else {
      G.fund = 0; p.cash += v; sfx('coin'); fxConfetti(playerPt(p), [p.color,'#FFD54A','#fff'], 20);
      admLog(esc(p.name)+'이(가) 기금 <b class="pos">'+fmt(v)+'원</b>을 전액 수령');
    }
  }
  else if(a==='transfer'){
    const to = G.players[num('admTo',-1)];
    if(!to || to.i===p.i) return;
    const cash = p.cash, props = ownedProps(p);
    p.cash = 0; to.cash += cash;
    props.forEach(i=>{ SP[i].owner = to.i; });
    sfx('buy'); fxConfetti(playerPt(to), [to.color,'#FFD54A','#fff'], 22);
    admLog(esc(p.name)+' → <b>'+esc(to.name)+'</b> 현금 '+fmt(cash)+'원과 부동산 '+props.length+'곳 전부 이전');
  }
  else if(a==='bankrupt'){
    const raw = $('admDest') ? $('admDest').value : 'bank';
    const dest = (raw==='bank'||raw==='fund') ? raw : G.players[parseInt(raw,10)];
    if(!p.alive){ admLog('이미 탈락한 참가자입니다.'); }
    else { closeModal(); admLog('<b>'+esc(p.name)+'</b>을(를) 강제 파산 처리'); bankrupt(p, dest, ()=>{}); return; }
  }
  else if(a==='revive'){
    if(p.alive){ admLog('이미 생존 중입니다.'); }
    else { p.alive = true; if(p.cash<=0) p.cash = 50; G.over = false; sfx('win'); admLog('<b>'+esc(p.name)+'</b>을(를) 되살렸습니다. (현금 '+fmt(p.cash)+'원)'); }
  }
  else if(a==='unover'){ G.over = false; closeModal(); admLog('승부를 취소하고 게임을 계속합니다.'); beginTurn(); return; }
  else if(a==='own'){ const i = num('admProp',-1); if(i>=0){ SP[i].owner = p.i; admLog('<b>'+SP[i].name+'</b>을(를) '+esc(p.name)+' 소유로 변경'); fxFlashCell(i); } }
  else if(a==='unown'){ const i = num('admProp',-1); if(i>=0){ SP[i].owner = null; if(SP[i].type==='city') SP[i].bl={v:0,b:0,h:0,L:0}; admLog('<b>'+SP[i].name+'</b>을(를) 매물로 되돌림'); fxFlashCell(i); } }
  else if(a.indexOf('bl-')===0){
    const i = num('admProp',-1);
    if(i>=0 && SP[i].type==='city'){
      const key = a.slice(3);
      if(key==='clear'){ SP[i].bl = {v:0,b:0,h:0,L:0}; admLog('<b>'+SP[i].name+'</b>의 건물을 전부 철거'); }
      else { SP[i].bl[key] = SP[i].bl[key] ? 0 : 1; admLog('<b>'+SP[i].name+'</b> 건물 변경 → 통행료 '+fmt(calcToll(SP[i]))+'원'); }
      fxFlashCell(i);
    } else admLog('도시 칸에만 건물을 지을 수 있습니다.');
  }
  else if(a==='move' || a==='moveSal'){
    const i = num('admMove', p.pos);
    closeModal();
    admLog('<b>'+esc(p.name)+'</b>을(를) '+SP[i].name+'(으)로 이동'+(a==='moveSal'?' (월급 지급)':''));
    if(a==='moveSal') paySalary(p, '관리자 지급');
    teleport(p, i, false, ()=>{ renderAll(); openAdmin(); });
    return;
  }
  else if(a==='island'){ p.island = 3; p.cheongyeon = 0; p.pos = ISLAND_IDX; admLog('<b>'+esc(p.name)+'</b>을(를) 감옥으로 (3턴)'); }
  else if(a==='free'){ p.island = 0; p.trapped = 0; p.trapName=''; p.trapIcon=''; admLog('<b>'+esc(p.name)+'</b>의 감옥/구속 해제'); }
  else if(a==='cheong'){ p.cheongyeon = 2; p.island = 0; p.pos = CHEONGYEON_IDX; admLog('<b>'+esc(p.name)+'</b>을(를) 청연으로 (2턴)'); }
  else if(a==='travel'){ p.travel = 1; admLog('<b>'+esc(p.name)+'</b>에게 우주여행권 부여'); }
  else if(a==='escape'){ p.items.escape++; admLog('<b>'+esc(p.name)+'</b> 탈출권 '+p.items.escape+'장'); }
  else if(a==='pass'){ p.items.pass++; admLog('<b>'+esc(p.name)+'</b> 우대권 '+p.items.pass+'장'); }
  else if(a==='noitem'){ p.items = {escape:0, pass:0}; admLog('<b>'+esc(p.name)+'</b>의 아이템 비움'); }
  else if(a==='sal1' || a==='sal2' || a==='sal3'){ p.salaryMult = parseInt(a.slice(3),10); admLog('<b>'+esc(p.name)+'</b> 월급 '+p.salaryMult+'배'); }
  else if(a==='leader'){ p.leader = !p.leader; if(p.leader) p.underdog=false; admLog('<b>'+esc(p.name)+'</b> 우세(통행료＋25%) '+(p.leader?'켜짐':'꺼짐')); }
  else if(a==='underdog'){ p.underdog = !p.underdog; if(p.underdog){ p.leader=false; p.salaryMult=3; } admLog('<b>'+esc(p.name)+'</b> 열세(월급 3배) '+(p.underdog?'켜짐':'꺼짐')); }
  else if(a==='rig'){
    rigDice = [num('admD1',1), num('admD2',1)];
    admLog('다음 굴림을 <b>'+rigDice[0]+' + '+rigDice[1]+' = '+(rigDice[0]+rigDice[1])+'</b>로 고정'+(rigDice[0]===rigDice[1]?' (더블)':''));
  }
  else if(a==='unrig'){ rigDice = null; admLog('주사위 고정 해제'); }
  else if(a==='turn'){
    if(!p.alive){ admLog('탈락한 참가자에게는 차례를 줄 수 없습니다.'); }
    else { closeModal(); G.cur = p.i; admLog('<b>'+esc(p.name)+'</b>의 차례로 변경'); beginTurn(); return; }
  }
  else if(a==='skip'){ closeModal(); admLog('차례를 넘깁니다.'); endTurn(); return; }
  else if(a==='win'){
    if(!p.alive){ admLog('탈락한 참가자는 승리할 수 없습니다.'); }
    else {
      closeModal();
      G.players.forEach(x=>{ if(x.i!==p.i) x.alive = false; });
      G.over = false;
      admLog('<b>'+esc(p.name)+'</b>을(를) 즉시 승자로 선언');
      renderAll(); checkWinner();
      return;
    }
  }
  admRefresh();
}

/* ================= 시작 화면 ================= */
let setupN = 3;
let setupPieces = [0, 1, 2, 3];   /* 플레이어별 선택한 피규어 (PIECES 인덱스) */

function renderNameInputs(){
  const box = $('nameInputs');
  const prev = [];
  box.querySelectorAll('input').forEach(inp=>prev.push(inp.value));
  box.innerHTML = '';
  for(let i=0;i<setupN;i++){
    const row = document.createElement('div');
    row.className = 'nrow';
    const btn = document.createElement('button');
    btn.className = 'figbtn';
    btn.type = 'button';
    btn.title = PIECES[setupPieces[i]].n + ' (눌러서 바꾸기)';
    btn.appendChild(figureStage(PIECES[setupPieces[i]].k, PCOLORS[i], false));
    btn.addEventListener('click', ()=>openPiecePicker(i));
    row.appendChild(btn);
    const dot = document.createElement('span');
    dot.className = 'pdot';
    dot.style.background = PCOLORS[i];
    dot.textContent = i+1;
    row.appendChild(dot);
    const inp = document.createElement('input');
    inp.type = 'text'; inp.maxLength = 8; inp.id = 'pname'+i;
    inp.placeholder = '플레이어 '+(i+1);
    if(prev[i]) inp.value = prev[i];
    row.appendChild(inp);
    box.appendChild(row);
  }
}
function openPiecePicker(pi){
  const taken = {};
  for(let i=0;i<setupN;i++) if(i!==pi) taken[setupPieces[i]] = i;
  const wrap = document.createElement('div');
  wrap.className = 'figpick';
  PIECES.forEach((pc, idx)=>{
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'figopt' + (setupPieces[pi]===idx ? ' sel' : '') + (taken[idx]!==undefined ? ' taken' : '');
    if(taken[idx]!==undefined) b.disabled = true;
    const w = document.createElement('div');
    w.className = 'fwrap';
    w.appendChild(figureStage(pc.k, taken[idx]!==undefined ? '#9A9A9A' : PCOLORS[pi], false));
    b.appendChild(w);
    const lab = document.createElement('div');
    lab.className = 'flabel';
    lab.textContent = pc.n + (taken[idx]!==undefined ? ' (사용중)' : '');
    b.appendChild(lab);
    b.addEventListener('click', ()=>{
      if(taken[idx]!==undefined) return;
      setupPieces[pi] = idx;
      closeModal();
      renderNameInputs();
      sfx('card');
    });
    wrap.appendChild(b);
  });
  modal('말 고르기: 플레이어 '+(pi+1),
    '<p class="hint">보드 위에서 이 피규어가 당신의 말이 됩니다. 다른 사람이 고른 말은 선택할 수 없습니다.</p>',
    [{l:'닫기', cls:'ghost'}], PCOLORS[pi]);
  $('mBody').appendChild(wrap);
}
function startGame(){
  G.n = setupN;
  G.opts.takeover = $('optTakeover').checked;
  G.opts.startCash = parseInt(document.querySelector('input[name="scash"]:checked').value, 10);
  G.players = [];
  for(let i=0;i<G.n;i++){
    const inp = $('pname'+i);
    const nm = (inp && inp.value.trim()) || ('플레이어 '+(i+1));
    G.players.push({i:i, name:nm, color:PCOLORS[i], piece:setupPieces[i], cash:G.opts.startCash, pos:0, alive:true, island:0, travel:0, cheongyeon:0, trapped:0, trapName:'', trapIcon:'', salaryMult:1, leader:false, underdog:false, tollBuff:false, jailCount:0, careWins:0, daycareWins:0, criminal:false, cpEnjoyer:false, bhacks:false, items:{escape:0, pass:0}});
  }
  G.deck = CARDS.slice();
  for(let i=G.deck.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    const tmp = G.deck[i]; G.deck[i] = G.deck[j]; G.deck[j] = tmp;
  }
  G.cur = 0; G.turnNo = 1; G.fund = 0; G.over = false; G.endgameApplied = false; G.stepping = false;
  Object.keys(TOKELS).forEach(k=>{ const e=TOKELS[k]; if(e && e.parentNode) e.parentNode.removeChild(e); delete TOKELS[k]; });
  SP.forEach(sp=>{ if(sp.type==='city'){ sp.owner=null; sp.bl={v:0,b:0,h:0,L:0}; } if(sp.type==='veh') sp.owner=null; });
  $('setup').classList.add('hidden');
  $('game').classList.remove('hidden');
  startMusic();
  renderAll();
  log('🌍 <b>글로벌 마블</b> 시작! '+G.n+'명이 시작 자금 '+fmt(G.opts.startCash)+'원으로 출발합니다.');
  if(G.opts.takeover) log('🤝 인수 규칙 적용: 건물 없는 상대 도시는 땅값의 2배에 인수할 수 있습니다.');
  beginTurn();
}

/* ================= 초기화 ================= */
document.querySelectorAll('.mode-btn').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
    setupN = parseInt(b.dataset.n, 10);
    renderNameInputs();
  });
});
$('startBtn').addEventListener('click', startGame);
$('rulesBtn0').addEventListener('click', showRules);
$('rulesBtn').addEventListener('click', showRules);
$('muteBtn').addEventListener('click', ()=>{
  muted = !muted;
  $('muteBtn').textContent = muted ? '🔇' : '🔊';
});
$('musicBtn').addEventListener('click', toggleMusic);
$('concedeBtn').addEventListener('click', concede);

/* 숨은 관리자 입력칸: 비밀번호를 입력하면 열린다 */
(function(){
  const si = $('secretIn');
  if(!si) return;
  const tryUnlock = ()=>{
    if(si.value.trim() === ADMIN_PIN){ si.value = ''; si.blur(); unlockAdmin(); }
  };
  si.addEventListener('input', tryUnlock);
  si.addEventListener('keydown', e=>{ if(e.key === 'Enter') tryUnlock(); });
})();
$('resetBtn').addEventListener('click', ()=>{
  modal('새 게임', '<p>지금 게임을 끝내고 처음 화면으로 돌아갈까요?</p>', [
    {l:'새 게임 시작', cls:'danger', fn:()=>window.location.reload()},
    {l:'계속 진행', cls:'ghost'}
  ]);
});

buildBoard();
buildDice();
renderNameInputs();
document.querySelector('.mode-btn[data-n="3"]').classList.add('sel');
})();
</script>
</body>
</html>
