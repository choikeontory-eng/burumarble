<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>글로벌 마블 | 세계 도시 보드게임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --felt:#0E3B32; --felt2:#092820; --paper:#F8F2E0; --paper2:#EFE5C8;
  --ink:#2B2417; --line:#C9BC9C; --red:#D8432F; --blue:#1E5FAE;
  --gold:#C9A227; --wood:#3E3423;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  min-height:100vh;
  background:radial-gradient(1100px 700px at 50% 18%, #155246, var(--felt) 55%, var(--felt2));
  font-family:'Noto Sans KR',sans-serif;color:var(--ink);
}
button{font-family:inherit;cursor:pointer;touch-action:manipulation}
.hidden{display:none!important}
b{font-weight:700}
.pos{color:#1E7A45}
.neg{color:#C0392B}

/* ---------- 버튼 ---------- */
.btn{
  border:none;border-radius:10px;padding:10px 16px;font-size:15px;font-weight:700;
  background:#E7DDBE;color:var(--ink);box-shadow:0 2px 0 rgba(0,0,0,.25);
  transition:transform .06s ease, filter .12s;
}
.btn:hover{filter:brightness(1.05)}
.btn:active{transform:translateY(2px);box-shadow:none}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn.primary{background:var(--red);color:#fff}
.btn.alt{background:var(--blue);color:#fff}
.btn.ghost{background:transparent;border:2px solid rgba(0,0,0,.25);box-shadow:none}
.btn.danger{background:#8C2F2F;color:#fff}
.btn.mini{padding:5px 10px;font-size:12.5px;border-radius:8px}
.btn.big{font-size:18px;padding:14px 20px;width:100%}
.icon-btn{background:rgba(255,255,255,.12);border:none;border-radius:8px;color:#F3EDD8;font-size:16px;padding:6px 9px}
.icon-btn:hover{background:rgba(255,255,255,.22)}

/* ---------- 시작 화면 ---------- */
#setup{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-card{
  width:min(480px,94vw);background:var(--paper);border-radius:18px;padding:26px 26px 22px;
  box-shadow:0 24px 60px rgba(0,0,0,.5), inset 0 0 0 3px var(--gold), inset 0 0 0 6px var(--paper);
}
.logo{
  font-family:'Do Hyeon',sans-serif;font-size:46px;text-align:center;letter-spacing:.04em;
  color:#173A5E;line-height:1.05;
}
.logo .dice-glyph{color:var(--red)}
.tagline{text-align:center;color:#6E6248;font-size:13.5px;margin:6px 0 4px}
.stripe{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:12px 0 4px}
.stripe span{flex:1}
.sec-label{font-size:12.5px;font-weight:900;color:#8A7A54;letter-spacing:.12em;margin:16px 0 7px}
.mode-row{display:flex;gap:10px}
.mode-btn{
  flex:1;padding:13px 6px;border-radius:12px;border:2px solid var(--line);background:#fff;
  font-size:16px;font-weight:900;color:#5A5240;
}
.mode-btn.sel{border-color:var(--red);background:#FDEDE8;color:var(--red)}
.nrow{display:flex;align-items:center;gap:9px;margin-top:8px}
.nrow input{
  flex:1;padding:9px 12px;border-radius:10px;border:2px solid var(--line);background:#fff;
  font-size:15px;font-family:inherit;
}
.nrow input:focus{outline:none;border-color:var(--blue)}
.cash-row{display:flex;gap:8px}
.cashopt{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 4px;
  border:2px solid var(--line);border-radius:10px;background:#fff;font-size:14px;font-weight:700;
}
.cashopt:has(input:checked){border-color:var(--red);background:#FDEDE8;color:var(--red)}
.opt-row{display:flex;align-items:flex-start;gap:8px;margin-top:16px;font-size:13.5px;line-height:1.45;color:#4C4433}
.opt-row input{margin-top:3px;transform:scale(1.15)}
#startBtn{margin-top:18px}
#rulesBtn0{width:100%;margin-top:9px}

/* ---------- 게임 레이아웃 ---------- */
.game-wrap{display:flex;gap:14px;align-items:flex-start;justify-content:center;padding:12px;flex-wrap:wrap}
#board{
  width:min(96vw, calc(100vh - 24px), 860px);
  aspect-ratio:1/1;
  display:grid;
  grid-template-columns:1.55fr repeat(9,1fr) 1.55fr;
  grid-template-rows:1.55fr repeat(9,1fr) 1.55fr;
  gap:2.5px;background:var(--wood);padding:7px;border-radius:16px;
  box-shadow:0 22px 50px rgba(0,0,0,.5), inset 0 0 0 2px #5A4C32;
  container-type:size;
}

/* ---------- 칸 ---------- */
.cell{position:relative;background:var(--paper);border-radius:4px;overflow:hidden;cursor:pointer}
.cell:hover{filter:brightness(1.04)}
.cell .band{position:absolute;background:var(--gc,#999)}
.side-b .band{top:0;left:0;right:0;height:17%}
.side-t .band{bottom:0;left:0;right:0;height:17%}
.side-l .band{right:0;top:0;bottom:0;width:15%}
.side-r .band{left:0;top:0;bottom:0;width:15%}
.inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:2px;text-align:center}
.side-b .inner{padding-top:18%}
.side-t .inner{padding-bottom:18%}
.side-l .inner{padding-right:16%}
.side-r .inner{padding-left:16%}
.nm{font-weight:900;font-size:10px;font-size:1.72cqw;line-height:1.12;word-break:keep-all}
.nm.sm{font-size:9px;font-size:1.5cqw;color:#7A6C48}
.pr{font-size:9px;font-size:1.5cqw;color:#6E6248;font-weight:700}
.blds{font-size:9px;font-size:1.55cqw;line-height:1;min-height:1.6cqw;letter-spacing:-.05em}
.key-in .key-ic{font-size:14px;font-size:2.6cqw}
.corner .cor-ic{font-size:20px;font-size:3.6cqw}
.corner .nm{font-size:11px;font-size:1.9cqw}
.corner .cor-sub{font-size:9px;font-size:1.45cqw;color:#7A6C48;font-weight:700}
.cell.owned{box-shadow:inset 0 0 0 3px var(--oc)}
.tokens{position:absolute;bottom:2px;left:2px;right:2px;display:flex;gap:2px;justify-content:center;flex-wrap:wrap;pointer-events:none;z-index:3}
.token{
  width:16px;height:16px;width:2.7cqw;height:2.7cqw;min-width:13px;min-height:13px;
  border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;
  font-size:9px;font-size:1.5cqw;
}
@keyframes tokenpulse{0%,100%{transform:translateY(0)}50%{transform:translateY(-14%)}}
.token.cur{animation:tokenpulse 1s ease-in-out infinite}

/* ---------- 중앙 콘솔 ---------- */
#console{
  grid-area:2/2/11/11;margin:4px;border-radius:12px;
  background:linear-gradient(165deg,#11493C,#0A332A 70%);
  box-shadow:inset 0 0 0 2px rgba(243,231,184,.18);
  display:flex;flex-direction:column;align-items:stretch;padding:10px 14px;gap:6px;
  color:#F0EAD4;overflow:hidden;
}
.c-title{font-family:'Do Hyeon',sans-serif;font-size:24px;font-size:4.4cqw;text-align:center;color:#F3E7B8;letter-spacing:.06em;line-height:1}
.c-eng{text-align:center;font-size:9px;font-size:1.5cqw;letter-spacing:.42em;color:rgba(243,231,184,.55);font-weight:700;margin-top:-2px}
#turnBanner{
  text-align:center;font-size:14px;font-size:2.3cqw;background:rgba(0,0,0,.28);
  border-radius:99px;padding:5px 10px;margin:2px auto 0;max-width:92%;
}
#turnBanner .tno{opacity:.6;font-size:.82em;margin-left:6px}
.dice-row{display:flex;gap:14px;justify-content:center;margin:4px 0 2px}
.die{
  width:52px;height:52px;width:8.4cqw;height:8.4cqw;min-width:42px;min-height:42px;max-width:64px;max-height:64px;
  background:#FDFBF3;border-radius:18%;box-shadow:0 4px 8px rgba(0,0,0,.4), inset 0 -3px 0 rgba(0,0,0,.12);
  display:grid;grid-template:repeat(3,1fr)/repeat(3,1fr);padding:14%;
}
.die span{display:flex;align-items:center;justify-content:center}
.die .pip{background:#2B2417;border-radius:50%;width:72%;aspect-ratio:1;margin:auto}
.die.ace .pip{background:var(--red);transform:scale(1.35)}
@keyframes shake{0%{transform:rotate(0)}25%{transform:rotate(-14deg) translateY(-3px)}50%{transform:rotate(10deg)}75%{transform:rotate(-8deg) translateY(-2px)}100%{transform:rotate(0)}}
.die.shake{animation:shake .16s linear infinite}
#actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;min-height:46px;align-items:center}
#actions .btn{font-size:14px;font-size:2.15cqw;padding:8px 14px}
#log{
  flex:1;overflow-y:auto;background:rgba(0,0,0,.28);border-radius:10px;padding:7px 11px;
  font-size:12px;font-size:1.85cqw;line-height:1.55;min-height:0;
}
#log .ln{padding:1px 0;border-bottom:1px dashed rgba(255,255,255,.07)}
#log .ln.big{color:#FFD98A;font-weight:700}
#log .turnline{color:rgba(240,234,212,.55)}
#log .dblmark{color:#FFD98A}
#log .pos{color:#8FE3AE}
#log .neg{color:#FF9E8C}

/* ---------- 사이드 패널 ---------- */
#side{width:320px;max-width:96vw;display:flex;flex-direction:column;gap:10px}
.side-head{display:flex;align-items:center;justify-content:space-between}
.side-title{font-family:'Do Hyeon',sans-serif;font-size:22px;color:#F3E7B8;letter-spacing:.05em}
.tools{display:flex;gap:6px}
#players{display:flex;flex-direction:column;gap:8px}
.pcard{
  background:var(--paper);border-radius:12px;padding:9px 12px;
  box-shadow:0 4px 12px rgba(0,0,0,.3);border-left:6px solid transparent;
}
.pcard.now{border-left-color:var(--red);box-shadow:0 4px 12px rgba(0,0,0,.3), 0 0 0 2px rgba(255,255,255,.55)}
.pcard.dead{opacity:.5;filter:grayscale(.8)}
.prow1{display:flex;align-items:center;gap:7px}
.pname{font-size:15px}
.st{font-size:11px;font-weight:900;padding:2px 7px;border-radius:99px;margin-left:auto}
.st.isl{background:#FBE3C0;color:#8A5A16}
.st.trv{background:#D7E6FB;color:#1E5FAE}
.st.dead{background:#E8D9D9;color:#8C2F2F}
.prow2{display:flex;justify-content:space-between;align-items:baseline;font-size:13.5px;margin-top:3px}
.prow2 .tot{font-size:11.5px;color:#7A6C48}
.prow3{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px;min-height:12px}
.chip{width:13px;height:13px;border-radius:3.5px;display:inline-block;box-shadow:inset 0 0 0 1px rgba(0,0,0,.2)}
.nochip{font-size:11px;color:#A79A78}
.prow4{margin-top:5px;display:flex;gap:5px;flex-wrap:wrap}
.itm{font-size:11px;background:#FFF7DE;border:1px solid #E3D6A4;border-radius:6px;padding:1px 6px;font-weight:700}
.pdot{
  display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;
  color:#fff;font-weight:900;font-size:11px;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.35);flex:none;
}
.pdot.sm{width:16px;height:16px;font-size:9px}
.fund-box{
  background:rgba(0,0,0,.3);color:#F3E7B8;border-radius:12px;padding:9px 14px;font-size:14px;
  display:flex;justify-content:space-between;align-items:center;border:1px dashed rgba(243,231,184,.35);
}

/* ---------- 모달 ---------- */
#mBack{
  position:fixed;inset:0;background:rgba(6,20,16,.62);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;
}
#mBox{
  width:min(440px,94vw);max-height:88vh;background:var(--paper);border-radius:16px;overflow:hidden;
  box-shadow:0 30px 70px rgba(0,0,0,.55);display:flex;flex-direction:column;
}
#mTitle{
  font-family:'Do Hyeon',sans-serif;font-size:21px;padding:12px 18px;color:#fff;
  background:#173A5E;letter-spacing:.03em;flex:none;
}
#mBody{padding:14px 18px 4px;font-size:14.5px;line-height:1.6;overflow-y:auto}
#mBody p{margin:6px 0}
#mBtns{display:flex;gap:8px;justify-content:flex-end;padding:12px 18px 16px;flex-wrap:wrap;flex:none}
.hint{font-size:12.5px;color:#7A6C48}
.big-amt{font-size:18px;text-align:center;margin:10px 0}
.winline{font-size:17px;display:flex;align-items:center;gap:8px}

/* 증서 */
.deed{border:2px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:6px;background:#fff}
.deedhead{color:#fff;font-weight:900;font-size:16px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.deedg{font-size:11px;font-weight:700;opacity:.92}
.deedtbl{width:100%;border-collapse:collapse;font-size:13px}
.deedtbl td{padding:4.5px 12px;border-top:1px solid #EFE8D2}
.deedtbl td:nth-child(2n){text-align:right;font-weight:700}
.deedtbl .fullr td{background:#FBF4DC;font-weight:900}

/* 황금열쇠 카드 */
.keycard{
  border:2px solid var(--gold);border-radius:12px;background:linear-gradient(170deg,#FFFBEA,#F6EBC8);
  padding:14px 16px;text-align:center;box-shadow:inset 0 0 0 4px #fff;
}
.keytitle{font-family:'Do Hyeon',sans-serif;font-size:22px;color:#8A6A10;margin-bottom:4px}

/* 건설 목록 */
.blist{display:flex;flex-direction:column;gap:6px}
.brow{display:flex;align-items:center;gap:9px;background:#fff;border:2px solid var(--line);border-radius:10px;padding:8px 12px;font-size:14.5px}
.brow:has(input:checked){border-color:var(--blue);background:#EFF5FD}
.brow .bcost{margin-left:auto;font-weight:700}
.brow input{transform:scale(1.25)}
.btotal{text-align:right;font-size:14px}

/* 목적지, 매각 선택 */
.pickgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;max-height:44vh;overflow-y:auto;padding:2px}
.pickgrid.one{grid-template-columns:1fr}
.pick{
  display:flex;align-items:center;gap:7px;border:1.5px solid var(--line);border-radius:8px;
  background:#fff;padding:6px 8px;font-size:12.5px;text-align:left;
}
.pick:hover{border-color:var(--blue);background:#EFF5FD}
.pickband{width:8px;height:20px;border-radius:3px;flex:none}
.pickn{font-weight:700;word-break:keep-all}
.picks{margin-left:auto;color:#7A6C48;font-size:11px;text-align:right;flex:none}
.sellrow{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--line);border-radius:9px;padding:7px 10px;font-size:13.5px;margin-bottom:5px}
.sellrow .srn{font-weight:700}
.sellrow .btn{margin-left:auto}
.selllist{max-height:38vh;overflow-y:auto}

/* 규칙 */
.rules h4{margin:12px 0 4px;font-size:14.5px;color:#173A5E}
.rules p{margin:3px 0;font-size:13.5px}

@media (max-width:1220px){
  .game-wrap{flex-direction:column;align-items:center}
  #side{width:min(96vw,860px)}
  #players{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:8px}
}
@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<div id="setup">
  <div class="setup-card">
    <div class="logo"><span class="dice-glyph">⚄</span> 글로벌 마블 <span class="dice-glyph">⚂</span></div>
    <div class="tagline">주사위 하나로 떠나는 세계 도시 쟁탈전</div>
    <div class="stripe">
      <span style="background:#4CAF6D"></span><span style="background:#B07D3E"></span>
      <span style="background:#4FA3D1"></span><span style="background:#8E6BC7"></span>
      <span style="background:#F08A24"></span><span style="background:#E96A8D"></span>
      <span style="background:#D64545"></span><span style="background:#2E5FB7"></span>
      <span style="background:#D4AF37"></span>
    </div>
    <div class="sec-label">플레이 인원</div>
    <div class="mode-row">
      <button class="mode-btn" data-n="3">👥 3인 플레이</button>
      <button class="mode-btn" data-n="4">👥 4인 플레이</button>
    </div>
    <div id="nameInputs"></div>
    <div class="sec-label">시작 자금</div>
    <div class="cash-row">
      <label class="cashopt"><input type="radio" name="scash" value="100"> 100만원</label>
      <label class="cashopt"><input type="radio" name="scash" value="150" checked> 150만원</label>
      <label class="cashopt"><input type="radio" name="scash" value="200"> 200만원</label>
    </div>
    <label class="opt-row">
      <input type="checkbox" id="optTakeover" checked>
      <span><b>인수 규칙</b>: 통행료를 낸 뒤, 건물이 없는 상대 도시를 땅값의 2배에 인수할 수 있습니다.</span>
    </label>
    <button id="startBtn" class="btn primary big">게임 시작</button>
    <button id="rulesBtn0" class="btn ghost">게임 규칙 보기</button>
  </div>
</div>

<div id="game" class="hidden">
  <div class="game-wrap">
    <div id="board"></div>
    <aside id="side">
      <div class="side-head">
        <span class="side-title">참가자 현황</span>
        <span class="tools">
          <button id="muteBtn" class="icon-btn" title="소리 켜기 끄기">🔊</button>
          <button id="rulesBtn" class="icon-btn" title="게임 규칙">❓</button>
          <button id="resetBtn" class="icon-btn" title="새 게임">↻</button>
        </span>
      </div>
      <div id="players"></div>
      <div class="fund-box"><span>💰 사회복지기금</span><b id="fundAmt">0만원</b></div>
    </aside>
  </div>
</div>

<div id="mBack" class="hidden">
  <div id="mBox">
    <div id="mTitle"></div>
    <div id="mBody"></div>
    <div id="mBtns"></div>
  </div>
</div>

<script>
(() => {
'use strict';

/* ================= 유틸 ================= */
const $ = (id) => document.getElementById(id);
const fmt = (v) => {
  v = Math.round(v);
  const neg = v < 0; v = Math.abs(v);
  let s;
  if (v >= 10000) {
    const eok = Math.floor(v / 10000), man = v % 10000;
    s = man ? eok + '억 ' + man.toLocaleString('ko-KR') + '만' : eok + '억';
  } else s = v.toLocaleString('ko-KR') + '만';
  return (neg ? '-' : '') + s;
};
const esc = (t) => String(t).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ================= 사운드 (WebAudio 합성음) ================= */
let AC = null, muted = false;
function sfx(kind) {
  if (muted) return;
  try {
    AC = AC || new (window.AudioContext || window.webkitAudioContext)();
    if (AC.state === 'suspended') AC.resume();
    const t = AC.currentTime;
    const play = (f, dt, dur, type, vol) => {
      type = type || 'triangle'; vol = vol === undefined ? 0.12 : vol;
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t + dt);
      g.gain.linearRampToValueAtTime(vol, t + dt + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dt + dur);
      o.connect(g); g.connect(AC.destination);
      o.start(t + dt); o.stop(t + dt + dur + 0.05);
    };
    if (kind === 'tick') play(920, 0, 0.05, 'square', 0.045);
    else if (kind === 'dice') { play(300,0,0.05,'square',0.07); play(430,0.06,0.05,'square',0.07); play(360,0.12,0.05,'square',0.07); }
    else if (kind === 'coin') { play(880,0,0.09); play(1318,0.09,0.15); }
    else if (kind === 'pay') { play(440,0,0.1); play(294,0.1,0.17); }
    else if (kind === 'buy') { play(659,0,0.08); play(880,0.08,0.08); play(1108,0.16,0.15); }
    else if (kind === 'card') { play(523,0,0.07,'sine',0.11); play(698,0.07,0.11,'sine',0.11); }
    else if (kind === 'bad') { play(220,0,0.18,'sawtooth',0.08); play(155,0.16,0.26,'sawtooth',0.08); }

function cellRC(i){
  if(i<=10) return [11, 11-i];

  if(i<=30) return [1, i-19];

}
function bandSide(i){
  if(i%10===0) return '';
  if(i<10) return 'side-b';
  if(i<20) return 'side-l';
  if(i<30) return 'side-t';
  return 'side-r';
}

/* ================= 돈의 흐름 ================= */
function gain(p, amt, why){
  p.cash += amt;
  sfx('coin');
  log('💵 <b>'+esc(p.name)+'</b> '+why+' <b class="pos">+'+fmt(amt)+'원</b>');
  renderPlayers();
}
function pay(from, amt, dest, why, cb){
  /* dest: 'bank' | 'fund' | 플레이어 객체 */
  const destName = dest==='bank' ? '은행' : dest==='fund' ? '사회복지기금' : dest.name;
  const settle = ()=>{
    from.cash -= amt;
    if(dest==='fund') G.fund += amt;
    else if(dest!=='bank') dest.cash += amt;
    sfx('pay');
    log('💸 <b>'+esc(from.name)+'</b> → '+esc(destName)+' '+why+' <b class="neg">-'+fmt(amt)+'원</b>');
    renderAll();
    cb(true);
  };
  if(from.cash >= amt){ settle(); return; }
  const raiseMax = from.cash + ownedProps(from).reduce((s,i)=>s+Math.floor(invested(SP[i])/2),0);
  if(raiseMax < amt){
    modal('💥 파산 위기',
      '<p><b>'+esc(from.name)+'</b>이(가) '+why+'(으)로 <b>'+fmt(amt)+'원</b>을 내야 하지만, 모든 부동산을 처분해도 마련할 수 없습니다.</p>' +
      '<p>남은 재산은 <b>'+esc(destName)+'</b>(으)로 넘어갑니다.</p>',
      [{l:'파산 처리', cls:'danger', fn:()=>bankrupt(from, dest, cb)}], '#8C2F2F');
    return;
  }
  sellFlow(from, amt, why, settle);
}
function sellToBank(p, idx){
  const sp = SP[idx];
  const val = Math.floor(invested(sp)/2);
  sp.owner = null;
  if(sp.type==='city') sp.bl = {v:0,b:0,h:0};
  p.cash += val;
  sfx('coin');
  log('🏦 <b>'+esc(p.name)+'</b>이(가) <b>'+sp.name+'</b>을(를) 은행에 '+fmt(val)+'원에 매각했습니다.');
  renderAll();
}
function sellFlow(from, amt, why, onReady){
  const rerun = ()=>{
    const need = amt - from.cash;
    if(need <= 0){
      modal('자금 마련 완료',
        '<p>필요한 금액이 준비되었습니다.</p><p class="big-amt">'+why+': <b class="neg">'+fmt(amt)+'원</b></p>',
        [{l:'지불하기', cls:'primary', fn:onReady}]);
      return;
    }
    const rows = ownedProps(from).map(i=>{
      const sp = SP[i], val = Math.floor(invested(sp)/2);
      return '<div class="sellrow"><span class="chip" style="background:'+GROUPS[sp.g].c+'"></span>' +
        '<span class="srn">'+sp.name+bldStr(sp)+'</span>' +
        '<button class="btn mini" data-sell="'+i+'">'+fmt(val)+'원에 매각</button></div>';
    }).join('');
    modal('현금이 부족합니다',
      '<p><b>'+esc(from.name)+'</b>: '+why+' <b>'+fmt(amt)+'원</b> 중 <b class="neg">'+fmt(need)+'원</b>이 부족합니다.</p>' +
      '<p class="hint">부동산을 은행에 매각해 자금을 마련하세요. 매각가는 투자액의 절반입니다.</p>' +
      '<div class="selllist">'+rows+'</div>', [], '#8C2F2F');
    $('mBody').querySelectorAll('[data-sell]').forEach(btn=>{
      btn.onclick = ()=>{ sellToBank(from, parseInt(btn.dataset.sell,10)); rerun(); };
    });
  };
  rerun();
}
function bankrupt(from, dest, cb){
  from.alive = false;
  const cash = from.cash; from.cash = 0;
  const props = ownedProps(from);
  if(dest!=='bank' && dest!=='fund'){
    dest.cash += cash;
    props.forEach(i=>{ SP[i].owner = dest.i; });
    log('💥 <b>'+esc(from.name)+'</b> 파산! 남은 재산이 모두 <b>'+esc(dest.name)+'</b>에게 넘어갑니다.', 'big');
  } else {
    if(dest==='fund') G.fund += cash;
    props.forEach(i=>{ SP[i].owner = null; if(SP[i].type==='city') SP[i].bl = {v:0,b:0,h:0}; });
    log('💥 <b>'+esc(from.name)+'</b> 파산! 소유하던 부동산이 모두 매물로 풀립니다.', 'big');
  }
  from.items = {escape:0, pass:0};
  from.travel = 0; from.island = 0;
  sfx('bad');
  renderAll();
  checkWinner();
  if(cb) cb(false);
}
function checkWinner(){
  const al = alivePlayers();
  if(al.length===1 && !G.over){
    G.over = true;
    const w = al[0];
    sfx('win');
    setActions([]);
    modal('🏆 승리!',
      '<p class="winline"><span class="pdot" style="background:'+w.color+'">'+(w.i+1)+'</span><b>'+esc(w.name)+'</b>이(가) 세계 경제를 제패했습니다!</p>' +
      '<p>최종 자산 <b>'+fmt(assets(w))+'원</b>, 총 '+G.turnNo+'턴 만의 승리입니다.</p>',
      [{l:'새 게임', cls:'primary', fn:()=>window.location.reload()}], '#B8860B');
  }
}

/* ================= 이동 ================= */
function stepMove(p, steps, cb){
  if(REDUCED){
    for(let s=0;s<steps;s++){ p.pos=(p.pos+1)%40; if(p.pos===0) gain(p, SALARY, '월급'); }
    renderTokens(); cb(); return;
  }
  let s = 0;
  const iv = setInterval(()=>{
    p.pos = (p.pos+1)%40;
    if(p.pos===0) gain(p, SALARY, '월급');
    sfx('tick');
    renderTokens();
    s++;
    if(s>=steps){ clearInterval(iv); setTimeout(cb, 200); }
  }, 170);
}
function teleport(p, dest, giveSalary, cb){
  if(giveSalary && dest < p.pos) gain(p, SALARY, '월급');
  p.pos = dest;
  renderTokens();
  setTimeout(cb, REDUCED ? 0 : 260);
}

/* ================= 턴 진행 ================= */
function beginTurn(){
  if(G.over) return;
  G.pendingDouble = false; G.chain = 0;
  const p = curP();
  renderBanner(); renderPlayers(); renderTokens();
  log('<span class="turnline">── '+G.turnNo+'턴, <b style="color:'+p.color+'">'+esc(p.name)+'</b>의 차례 ──</span>');
  if(p.island > 0){ islandTurn(p); return; }
  if(p.travel > 0){ travelTurn(p); return; }
  setActions([{l:'🎲 주사위 굴리기', fn:rollTurn}]);
}
function endTurn(){
  if(G.over) return;
  G.pendingDouble = false; G.chain = 0;
  let i = G.cur;
  do { i = (i+1)%G.n; } while(!G.players[i].alive);
  G.cur = i; G.turnNo++;
  beginTurn();
}
function endOfAction(){
  if(G.over) return;
  const p = curP();
  if(!p.alive){ endTurn(); return; }
  if(G.pendingDouble && p.island===0){
    G.pendingDouble = false;
    log('🎲 더블 보너스! 한 번 더 굴립니다.');
    setActions([{l:'🎲 주사위 굴리기 (더블)', fn:rollTurn}]);
    return;
  }
  setActions([{l:'턴 마치기 ➜', cls:'ghost', fn:endTurn}]);
}

let rolling = false;
function rollDice(cb){
  if(rolling) return;
  rolling = true;
  setActions([]);
  sfx('dice');
  const e1 = $('die1'), e2 = $('die2');
  e1.classList.add('shake'); e2.classList.add('shake');
  let n = 0;
  const iv = setInterval(()=>{
    setDie(e1, 1+Math.floor(Math.random()*6));
    setDie(e2, 1+Math.floor(Math.random()*6));
    n++;
    if(n>=8){
      clearInterval(iv);
      const d1 = 1+Math.floor(Math.random()*6), d2 = 1+Math.floor(Math.random()*6);
      setDie(e1,d1); setDie(e2,d2);
      e1.classList.remove('shake'); e2.classList.remove('shake');
      rolling = false;
      cb(d1,d2);
    }
  }, REDUCED ? 0 : 70);
}
function rollTurn(){
  const p = curP();
  p.travel = 0;
  rollDice((d1,d2)=>{
    const dbl = d1===d2;
    log('🎲 <b>'+esc(p.name)+'</b>: '+d1+' + '+d2+' = <b>'+(d1+d2)+'</b>'+(dbl?' <b class="dblmark">더블!</b>':''));
    if(dbl){
      G.chain++;
      if(G.chain>=3){
        log('🚨 연속 더블 3회! <b>'+esc(p.name)+'</b>은(는) 즉시 무인도로 이송됩니다.', 'big');
        p.island = 3;
        G.pendingDouble = false;
        teleport(p, ISLAND_IDX, false, ()=>{ renderAll(); setActions([{l:'턴 마치기 ➜', cls:'ghost', fn:endTurn}]); });
        return;
      }
      G.pendingDouble = true;
    } else {
      G.pendingDouble = false;
    }
    stepMove(p, d1+d2, ()=>resolveLanding(p, endOfAction));
  });
}

/* ----- 무인도 ----- */
function islandTurn(p){
  log('🏝️ <b>'+esc(p.name)+'</b>은(는) 무인도에 갇혀 있습니다. (남은 '+p.island+'턴)');
  const acts = [{l:'🎲 더블에 도전', fn:()=>islandRoll(p)}];
  if(p.items.escape > 0){
    acts.push({l:'🗝️ 탈출권 사용', cls:'alt', fn:()=>{
      p.items.escape--;
      p.island = 0;
      const card = CARDS.filter(c=>c.k==='escape')[0];
      if(G.deck.indexOf(card)<0) G.deck.push(card);
      log('🗝️ <b>'+esc(p.name)+'</b>이(가) 무인도 탈출권을 사용했습니다!');
      renderPlayers();
      setActions([{l:'🎲 주사위 굴리기', fn:rollTurn}]);
    }});
  }
  setActions(acts);
}
function islandRoll(p){
  rollDice((d1,d2)=>{
    log('🎲 <b>'+esc(p.name)+'</b>: '+d1+' + '+d2+(d1===d2?' <b class="dblmark">더블!</b>':''));
    if(d1===d2){
      p.island = 0;
      log('🎉 더블! <b>'+esc(p.name)+'</b>이(가) 무인도를 탈출합니다.');
      renderPlayers();
      stepMove(p, d1+d2, ()=>resolveLanding(p, endOfAction));
    } else {
      p.island--;
      if(p.island===0) log('⏳ 탈출 실패. 고립이 끝나 다음 차례부터 자유롭게 이동합니다.');
      else log('⏳ 탈출 실패. 무인도에서 '+p.island+'턴 더 기다립니다.');
      renderPlayers();
      setActions([{l:'턴 마치기 ➜', cls:'ghost', fn:endTurn}]);
    }
  });
}

/* ----- 우주여행 ----- */
function travelTurn(p){
  const ownerIdx = SP[SHUTTLE_IDX].owner;
  const free = p.travel===2 || ownerIdx===null || ownerIdx===p.i;
  const feeTxt = free ? '무료' : '이용료 '+fmt(SPACE_FEE)+'원을 '+esc(G.players[ownerIdx].name)+'에게 지불';
  log('🚀 <b>'+esc(p.name)+'</b>은(는) 우주여행을 이용할 수 있습니다. ('+feeTxt+')');
  const canUse = free || p.cash >= SPACE_FEE;
  setActions([
    {l:'🚀 우주여행 이용', cls:'alt', dis:!canUse, hint:'이용료가 부족합니다', fn:()=>{
      p.travel = 0;
      renderPlayers();
      if(free){ openTravelPicker(p); }
      else {
        pay(p, SPACE_FEE, G.players[ownerIdx], '우주여행 이용료', (ok)=>{
          if(ok) openTravelPicker(p); else endOfAction();
        });
      }
    }},
    {l:'🎲 그냥 주사위 굴리기', fn:()=>{ rollTurn(); }}
  ]);
}
function openTravelPicker(p){
  let rows = '';
  SP.forEach((sp,i)=>{
    if(i===p.pos) return;
    let sub = '';
    if(sp.type==='city' || sp.type==='veh'){
      sub = sp.owner===null ? fmt(sp.price) : (sp.owner===p.i ? '내 땅' : esc(G.players[sp.owner].name));
    }
    const col = (sp.type==='city'||sp.type==='veh') ? GROUPS[sp.g].c : '#8A8272';
    rows += '<button class="pick" data-go="'+i+'"><span class="pickband" style="background:'+col+'"></span>' +
      '<span class="pickn">'+sp.name+'</span><span class="picks">'+sub+'</span></button>';
  });
  modal('🚀 우주여행: 목적지 선택',
    '<p class="hint">앞으로 진행하는 이동으로 취급하며, 출발지를 지나면 월급을 받습니다.</p><div class="pickgrid">'+rows+'</div>',
    [{l:'취소하고 주사위 굴리기', cls:'ghost', fn:rollTurn}]);
  $('mBody').querySelectorAll('[data-go]').forEach(btn=>{
    btn.onclick = ()=>{
      closeModal();
      const dest = parseInt(btn.dataset.go,10);
      log('🚀 <b>'+esc(p.name)+'</b>이(가) <b>'+SP[dest].name+'</b>(으)로 우주여행을 떠납니다.');
      teleport(p, dest, true, ()=>resolveLanding(p, endOfAction));
    };
  });
}

/* ================= 도착 처리 ================= */
function resolveLanding(p, done){
  const sp = SP[p.pos];
  if(sp.type==='start'){ log('🏁 출발지에 도착했습니다.'); done(); return; }
  if(sp.type==='key'){ drawKey(p, done); return; }
  if(sp.type==='island'){
    p.island = 3;
    log('🏝️ <b>'+esc(p.name)+'</b>이(가) 무인도에 표류했습니다! 3턴 동안 갇힙니다.');
    renderPlayers(); done(); return;
  }
  if(sp.type==='space'){
    p.travel = 1;
    log('🚀 우주여행 승강장! 다음 차례에 원하는 칸으로 이동할 수 있습니다.');
    renderPlayers(); done(); return;
  }
  if(sp.type==='fund'){
    if(G.fund>0){ const a=G.fund; G.fund=0; gain(p, a, '사회복지기금 수령'); renderCells(); }
    else log('💰 사회복지기금 접수처. 아직 적립된 기금이 없습니다.');
    done(); return;
  }
  if(sp.owner===null){ offerBuy(p, sp, done); return; }
  if(sp.owner===p.i){
    if(sp.type==='city') offerBuild(p, sp, done);
    else { log('✨ 내 소유의 <b>'+sp.name+'</b>에 도착했습니다.'); done(); }
    return;
  }
  tollFlow(p, sp, done);
}

function deedHTML(sp){
  if(sp.type==='veh'){
    return '<div class="deed"><div class="deedhead" style="background:'+GROUPS.vh.c+'">'+sp.name+'<span class="deedg">교통수단</span></div>' +
      '<table class="deedtbl"><tr><td>가격</td><td>'+fmt(sp.price)+'원</td></tr><tr><td>통행료 (고정)</td><td>'+fmt(sp.toll)+'원</td></tr></table></div>' +
      (SP.indexOf(sp)===SHUTTLE_IDX ? '<p class="hint">우주왕복선을 소유하면 우주여행 이용료 20만원이 소유자에게 들어옵니다.</p>' : '');
  }
  const g = GROUPS[sp.g];
  return '<div class="deed"><div class="deedhead" style="background:'+g.c+'">'+sp.name+'<span class="deedg">'+g.n+'</span></div>' +
    '<table class="deedtbl">' +
    '<tr><td>땅값</td><td>'+fmt(sp.price)+'원</td><td>통행료</td><td>'+fmt(sp.t[0])+'원</td></tr>' +
    '<tr><td>별장 🏠</td><td>'+fmt(sp.bc[0])+'원</td><td>추가</td><td>+'+fmt(sp.t[1])+'원</td></tr>' +
    '<tr><td>빌딩 🏢</td><td>'+fmt(sp.bc[1])+'원</td><td>추가</td><td>+'+fmt(sp.t[2])+'원</td></tr>' +
    '<tr><td>호텔 🏨</td><td>'+fmt(sp.bc[2])+'원</td><td>추가</td><td>+'+fmt(sp.t[3])+'원</td></tr>' +
    '<tr class="fullr"><td colspan="2">풀하우스 통행료</td><td colspan="2">'+fmt(sp.t[0]+sp.t[1]+sp.t[2]+sp.t[3])+'원</td></tr>' +
    '</table></div>';
}

function offerBuy(p, sp, done){
  const afford = p.cash >= sp.price;
  modal('매물: '+sp.name,
    deedHTML(sp) + '<p>'+(afford ? '이 땅을 구입하시겠습니까?' : '<b class="neg">현금이 부족해 구입할 수 없습니다.</b>')+'</p>',
    [
      {l:'구입하기 ('+fmt(sp.price)+'원)', cls:'primary', dis:!afford, fn:()=>{
        p.cash -= sp.price;
        sp.owner = p.i;
        sfx('buy');
        log('📜 <b>'+esc(p.name)+'</b>이(가) <b>'+sp.name+'</b>을(를) '+fmt(sp.price)+'원에 구입했습니다!');
        renderAll();
        if(sp.type==='city') offerBuild(p, sp, done); else done();
      }},
      {l:'사지 않기', cls:'ghost', fn:done}
    ], GROUPS[sp.g].c);
}

function offerBuild(p, sp, done){
  const missing = [];
  if(!sp.bl.v) missing.push(0);
  if(!sp.bl.b) missing.push(1);
  if(!sp.bl.h) missing.push(2);
  if(missing.length===0){ log('🏨 <b>'+sp.name+'</b>은(는) 이미 풀하우스입니다.'); done(); return; }
  const rows = missing.map(k=>
    '<label class="brow"><input type="checkbox" data-b="'+k+'"><span>'+BICONS[k]+' '+BNAMES[k]+'</span><span class="bcost">'+fmt(sp.bc[k])+'원</span></label>'
  ).join('');
  modal('건설: '+sp.name,
    '<p class="hint">내 도시에 도착하면 건물을 지을 수 있습니다. 보유 현금 '+fmt(p.cash)+'원</p>' +
    '<div class="blist">'+rows+'</div><p class="btotal">건설비 합계: <b id="bSum">0만원</b></p>',
    [
      {l:'건설하기', cls:'primary', keep:true, fn:()=>{
        const boxes = $('mBody').querySelectorAll('[data-b]');
        const sel = [];
        boxes.forEach(x=>{ if(x.checked) sel.push(parseInt(x.dataset.b,10)); });
        const total = sel.reduce((s,k)=>s+sp.bc[k],0);
        if(sel.length===0 || total>p.cash) return;
        closeModal();
        p.cash -= total;
        sel.forEach(k=>{ if(k===0) sp.bl.v=1; if(k===1) sp.bl.b=1; if(k===2) sp.bl.h=1; });
        sfx('buy');
        log('🏗️ <b>'+esc(p.name)+'</b>이(가) <b>'+sp.name+'</b>에 '+sel.map(k=>BNAMES[k]).join(', ')+'을(를) 건설했습니다. <b class="neg">-'+fmt(total)+'원</b>');
        renderAll();
        done();
      }},
      {l:'짓지 않기', cls:'ghost', fn:done}
    ], GROUPS[sp.g].c);
  const upd = ()=>{
    const boxes = $('mBody').querySelectorAll('[data-b]');
    let total = 0;
    boxes.forEach(x=>{ if(x.checked) total += sp.bc[parseInt(x.dataset.b,10)]; });
    const over = total > p.cash;
    $('bSum').innerHTML = '<span class="'+(over?'neg':'')+'">'+fmt(total)+'원'+(over?' (현금 부족)':'')+'</span>';
  };
  $('mBody').querySelectorAll('[data-b]').forEach(cbx=>{ cbx.onchange = upd; });
}

function deedShort(sp, owner, toll){
  return '<p><b>'+sp.name+'</b>'+bldStr(sp)+'은(는) <span class="pdot sm" style="background:'+owner.color+'">'+(owner.i+1)+'</span> <b>'+esc(owner.name)+'</b> 소유입니다.</p>' +
    '<p class="big-amt">통행료 <b class="neg">'+fmt(toll)+'원</b></p>';
}
function tollFlow(p, sp, done){
  const owner = G.players[sp.owner];
  const toll = calcToll(sp);
  const proceed = ()=>{
    pay(p, toll, owner, sp.name+' 통행료', (ok)=>{
      if(!ok){ done(); return; }
      maybeTakeover(p, sp, owner, done);
    });
  };
  if(p.items.pass > 0){
    modal('통행료: '+sp.name,
      deedShort(sp, owner, toll) + '<p>우대권을 사용해 통행료를 면제받을 수 있습니다.</p>',
      [
        {l:'🎫 우대권 사용', cls:'alt', fn:()=>{
          p.items.pass--;
          const card = CARDS.filter(c=>c.k==='pass')[0];
          if(G.deck.indexOf(card)<0) G.deck.push(card);
          log('🎫 <b>'+esc(p.name)+'</b>이(가) 우대권으로 <b>'+sp.name+'</b> 통행료 '+fmt(toll)+'원을 면제받았습니다!');
          renderPlayers();
          done();
        }},
        {l:'지불하기 ('+fmt(toll)+'원)', cls:'primary', fn:proceed}
      ], '#8C2F2F');
    return;
  }
  modal('통행료: '+sp.name, deedShort(sp, owner, toll),
    [{l:'지불하기 ('+fmt(toll)+'원)', cls:'primary', fn:proceed}], '#8C2F2F');
}
function maybeTakeover(p, sp, owner, done){
  const noBld = sp.type==='city' && !sp.bl.v && !sp.bl.b && !sp.bl.h;
  const cost = sp.price*2;
  if(!G.opts.takeover || !noBld || !owner.alive || !p.alive || p.cash < cost){ done(); return; }
  modal('인수 기회: '+sp.name,
    deedHTML(sp) + '<p>건물이 없는 도시입니다. 땅값의 2배인 <b>'+fmt(cost)+'원</b>을 <b>'+esc(owner.name)+'</b>에게 지불하고 인수할 수 있습니다.</p>',
    [
      {l:'인수하기 ('+fmt(cost)+'원)', cls:'primary', fn:()=>{
        p.cash -= cost;
        owner.cash += cost;
        sp.owner = p.i;
        sfx('buy');
        log('🤝 <b>'+esc(p.name)+'</b>이(가) <b>'+esc(owner.name)+'</b>의 <b>'+sp.name+'</b>을(를) '+fmt(cost)+'원에 인수했습니다!', 'big');
        renderAll();
        done();
      }},
      {l:'괜찮습니다', cls:'ghost', fn:done}
    ], GROUPS[sp.g].c);
}

/* ================= 황금열쇠 ================= */
function drawKey(p, done){
  const c = G.deck.shift();
  if(!c.keep) G.deck.push(c);
  sfx('card');
  modal('🔑 황금열쇠',
    '<div class="keycard"><div class="keytitle">'+c.t+'</div><p>'+c.d+'</p></div>',
    [{l:'확인', cls:'primary', fn:()=>applyCard(p, c, done)}], '#B8860B');
}
function applyCard(p, c, done){
  if(c.k==='world'){
    gain(p, SALARY, '세계일주 월급');
    if(G.fund>0){ const a=G.fund; G.fund=0; gain(p, a, '사회복지기금 수령'); renderCells(); }
    done();
  } else if(c.k==='island'){
    p.island = 3;
    teleport(p, ISLAND_IDX, false, ()=>{
      log('🏝️ <b>'+esc(p.name)+'</b>이(가) 무인도로 쫓겨났습니다. 3턴 동안 갇힙니다.');
      renderPlayers(); done();
    });
  } else if(c.k==='space'){
    teleport(p, SPACE_IDX, true, ()=>{
      p.travel = 2;
      log('🚀 우주여행 승강장으로 이동했습니다. 다음 차례에 무료로 원하는 칸에 갈 수 있습니다.');
      renderPlayers(); done();
    });
  } else if(c.k==='goto'){
    teleport(p, c.to, true, ()=>resolveLanding(p, done));
  } else if(c.k==='fundgo'){
    teleport(p, FUND_IDX, true, ()=>{
      if(G.fund>0){ const a=G.fund; G.fund=0; gain(p, a, '사회복지기금 수령'); renderCells(); }
      else log('💰 접수처에 도착했지만 적립된 기금이 없습니다.');
      done();
    });
  } else if(c.k==='back'){
    p.pos = (p.pos + 40 - c.n) % 40;
    renderTokens();
    setTimeout(()=>resolveLanding(p, done), REDUCED ? 0 : 260);
  } else if(c.k==='gain'){
    gain(p, c.a, c.t);
    done();
  } else if(c.k==='pay'){
    pay(p, c.a, 'fund', c.t, ()=>done());
  } else if(c.k==='perb'){
    let v=0,b=0,h=0;
    SP.forEach(sp=>{ if(sp.type==='city' && sp.owner===p.i){ v+=sp.bl.v; b+=sp.bl.b; h+=sp.bl.h; } });
    const total = v*c.f[0] + b*c.f[1] + h*c.f[2];
    if(total===0){ log('🏚️ 보유한 건물이 없어 낼 금액이 없습니다.'); done(); }
    else pay(p, total, 'fund', c.t+' (별장 '+v+', 빌딩 '+b+', 호텔 '+h+')', ()=>done());
  } else if(c.k==='escape'){
    p.items.escape++;
    log('🗝️ 무인도 탈출권을 획득했습니다.');
    renderPlayers(); done();
  } else if(c.k==='pass'){
    p.items.pass++;
    log('🎫 우대권을 획득했습니다.');
    renderPlayers(); done();
  } else if(c.k==='bday'){
    birthdayChain(p, alivePlayers().filter(x=>x.i!==p.i), done);
  } else if(c.k==='halfsale'){
    halfSale(p, done);
  } else {
    done();
  }
}
function birthdayChain(p, payers, done){
  if(payers.length===0){ done(); return; }
  const payer = payers[0];
  pay(payer, 5, p, esc(p.name)+' 생일 축하금', ()=>birthdayChain(p, payers.slice(1), done));
}
function halfSale(p, done){
  const props = ownedProps(p);
  if(props.length===0){
    modal('반액 대매출', '<p>매각할 부동산이 없어 그냥 넘어갑니다. 다행이네요!</p>',
      [{l:'확인', cls:'primary', fn:done}], '#8C2F2F');
    return;
  }
  const rows = props.map(i=>{
    const sp = SP[i], val = Math.floor(invested(sp)/2);
    return '<button class="pick" data-hs="'+i+'"><span class="pickband" style="background:'+GROUPS[sp.g].c+'"></span>' +
      '<span class="pickn">'+sp.name+bldStr(sp)+'</span><span class="picks">'+fmt(val)+'원</span></button>';
  }).join('');
  modal('반액 대매출',
    '<p>소유한 부동산 하나를 골라 은행에 <b>투자액의 절반</b> 가격으로 매각해야 합니다.</p><div class="pickgrid one">'+rows+'</div>',
    [], '#8C2F2F');
  $('mBody').querySelectorAll('[data-hs]').forEach(btn=>{
    btn.onclick = ()=>{ closeModal(); sellToBank(p, parseInt(btn.dataset.hs,10)); done(); };
  });
}

/* ================= 칸 정보, 규칙 ================= */
function showCellInfo(i){
  if(!$('mBack').classList.contains('hidden')) return;
  const sp = SP[i];
  if(sp.type==='city' || sp.type==='veh'){
    let ownLine = '<p class="hint">아직 주인이 없습니다.</p>';
    if(sp.owner!==null){
      const ow = G.players[sp.owner];
      ownLine = '<p><span class="pdot sm" style="background:'+ow.color+'">'+(ow.i+1)+'</span> <b>'+esc(ow.name)+'</b> 소유, 현재 통행료 <b>'+fmt(calcToll(sp))+'원</b></p>';
    }
    modal(sp.name, deedHTML(sp)+ownLine, [{l:'닫기', cls:'ghost'}], GROUPS[sp.g].c);
  } else {
    const descMap = {
      start:'한 바퀴를 돌아 이 칸을 지나거나 도착할 때마다 월급 20만원을 받습니다.',
      key:'황금열쇠 카드를 한 장 뽑아 지시를 따릅니다.',
      island:'도착하면 3턴 동안 갇힙니다. 자기 차례에 더블이 나오면 즉시 탈출해 이동하고, 무인도 탈출권을 사용할 수도 있습니다.',
      fund:'벌금과 세금이 이곳에 적립됩니다. 이 칸에 도착한 사람이 적립금을 모두 가져갑니다.',
      space:'도착하면 다음 차례에 주사위 대신 원하는 칸으로 이동할 수 있습니다. 우주왕복선 소유자가 있으면 이용료 20만원을 그 사람에게 냅니다. 소유자가 없으면 무료입니다.'
    };
    modal(sp.name, '<p>'+descMap[sp.type]+'</p>', [{l:'닫기', cls:'ghost'}]);
  }
}
function showRules(){
  modal('게임 규칙',
    '<div class="rules">' +
    '<h4>🎯 목표</h4><p>다른 플레이어를 모두 파산시키고 최후의 1인이 되면 승리합니다.</p>' +
    '<h4>🎲 진행</h4><p>주사위 두 개를 굴려 나온 수만큼 이동합니다. 더블이 나오면 한 번 더 굴립니다. 단, 한 차례에 더블이 세 번 연속 나오면 즉시 무인도로 갑니다.</p>' +
    '<h4>💵 월급</h4><p>출발지를 지나거나 도착할 때마다 월급 20만원을 받습니다. 무인도로 끌려갈 때는 예외적으로 받지 못합니다.</p>' +
    '<h4>🏙️ 도시와 건물</h4><p>주인 없는 도시에 도착하면 살 수 있습니다. 내 도시에 도착하면(구입 직후 포함) 별장, 빌딩, 호텔을 각각 1채씩 지을 수 있습니다. 상대 도시에 도착하면 땅과 건물 통행료를 합한 금액을 냅니다. 교통수단(여객기, 크루즈, 우주왕복선)은 건물 없이 고정 통행료를 받습니다.</p>' +
    '<h4>🤝 인수 (선택 규칙)</h4><p>통행료를 낸 뒤, 건물이 없는 상대 도시는 땅값의 2배를 소유자에게 지불하고 인수할 수 있습니다.</p>' +
    '<h4>🔑 황금열쇠</h4><p>황금열쇠 칸에 도착하면 카드를 뽑아 지시를 따릅니다. 무인도 탈출권과 우대권은 사용할 때까지 보관합니다.</p>' +
    '<h4>🏝️ 무인도</h4><p>도착하면 3턴 동안 갇힙니다. 자기 차례에 더블이 나오면 즉시 탈출해 그만큼 이동합니다. 탈출권을 쓰면 바로 나올 수 있습니다.</p>' +
    '<h4>🚀 우주여행</h4><p>도착하면 다음 차례에 주사위 대신 원하는 칸으로 이동할 수 있습니다. 우주왕복선 소유자가 있으면 이용료 20만원을 그 사람에게 내고, 소유자가 없으면 무료입니다. 원하지 않으면 그냥 주사위를 굴려도 됩니다.</p>' +
    '<h4>💰 사회복지기금</h4><p>벌금과 세금이 기금에 적립되고, 접수처 칸에 도착한 사람이 전액 가져갑니다.</p>' +
    '<h4>💥 매각과 파산</h4><p>돈이 부족하면 부동산을 은행에 투자액의 절반 가격으로 매각할 수 있습니다. 그래도 지불할 수 없으면 파산하며, 남은 재산은 받을 사람(플레이어면 그 플레이어, 아니면 은행)에게 넘어갑니다.</p>' +
    '</div>',
    [{l:'닫기', cls:'primary'}]);
}

/* ================= 시작 화면 ================= */
let setupN = 3;
function renderNameInputs(){
  const box = $('nameInputs');
  const prev = [];
  box.querySelectorAll('input').forEach(inp=>prev.push(inp.value));
  box.innerHTML = '';
  for(let i=0;i<setupN;i++){
    const row = document.createElement('div');
    row.className = 'nrow';
    row.innerHTML = '<span class="pdot" style="background:'+PCOLORS[i]+'">'+(i+1)+'</span>' +
      '<input type="text" maxlength="8" id="pname'+i+'" placeholder="플레이어 '+(i+1)+'">';
    box.appendChild(row);
    if(prev[i]) row.querySelector('input').value = prev[i];
  }
}
function startGame(){
  G.n = setupN;
  G.opts.takeover = $('optTakeover').checked;
  G.opts.startCash = parseInt(document.querySelector('input[name="scash"]:checked').value, 10);
  G.players = [];
  for(let i=0;i<G.n;i++){
    const inp = $('pname'+i);
    const nm = (inp && inp.value.trim()) || ('플레이어 '+(i+1));
    G.players.push({i:i, name:nm, color:PCOLORS[i], cash:G.opts.startCash, pos:0, alive:true, island:0, travel:0, items:{escape:0, pass:0}});
  }
  G.deck = CARDS.slice();
  for(let i=G.deck.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    const tmp = G.deck[i]; G.deck[i] = G.deck[j]; G.deck[j] = tmp;
  }
  G.cur = 0; G.turnNo = 1; G.fund = 0; G.over = false;
  SP.forEach(sp=>{ if(sp.type==='city'){ sp.owner=null; sp.bl={v:0,b:0,h:0}; } if(sp.type==='veh') sp.owner=null; });
  $('setup').classList.add('hidden');
  $('game').classList.remove('hidden');
  renderAll();
  log('🌍 <b>글로벌 마블</b> 시작! '+G.n+'명이 시작 자금 '+fmt(G.opts.startCash)+'원으로 출발합니다.');
  if(G.opts.takeover) log('🤝 인수 규칙 적용: 건물 없는 상대 도시는 땅값의 2배에 인수할 수 있습니다.');
  beginTurn();
}

/* ================= 초기화 ================= */
document.querySelectorAll('.mode-btn').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
    setupN = parseInt(b.dataset.n, 10);
    renderNameInputs();
  });
});
$('startBtn').addEventListener('click', startGame);
$('rulesBtn0').addEventListener('click', showRules);
$('rulesBtn').addEventListener('click', showRules);
$('muteBtn').addEventListener('click', ()=>{
  muted = !muted;
  $('muteBtn').textContent = muted ? '🔇' : '🔊';
});
$('resetBtn').addEventListener('click', ()=>{
  modal('새 게임', '<p>지금 게임을 끝내고 처음 화면으로 돌아갈까요?</p>', [
    {l:'새 게임 시작', cls:'danger', fn:()=>window.location.reload()},
    {l:'계속 진행', cls:'ghost'}
  ]);
});

buildBoard();
renderNameInputs();
document.querySelector('.mode-btn[data-n="3"]').classList.add('sel');
setDie($('die1'), 5);
setDie($('die2'), 3);
})();
